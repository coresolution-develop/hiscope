version: "3.9"

services:
  db:
    image: postgres:16
    container_name: hiscope-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hiscope_eval}
      POSTGRES_USER: ${POSTGRES_USER:-hiscope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - hiscope_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hiscope-app
    depends_on:
      - db
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8099
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-hiscope_eval}
      DB_USERNAME: ${POSTGRES_USER:-hiscope}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      SESSION_COOKIE_SECURE: "true"
      APP_BOOTSTRAP_SUPER_ADMIN_ENABLED: ${APP_BOOTSTRAP_SUPER_ADMIN_ENABLED:-false}
      APP_BOOTSTRAP_SUPER_ADMIN_LOGIN_ID: ${APP_BOOTSTRAP_SUPER_ADMIN_LOGIN_ID:-super}
      APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD: ${APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD:-change-me}
      APP_UPLOAD_MAX_FILE_SIZE_BYTES: ${APP_UPLOAD_MAX_FILE_SIZE_BYTES:-10485760}
      APP_UPLOAD_MAX_ROWS: ${APP_UPLOAD_MAX_ROWS:-5000}
      LOG_DIR: /app/logs
    ports:
      - "8099:8099"
    volumes:
      - hiscope_app_logs:/app/logs

volumes:
  hiscope_db_data:
  hiscope_app_logs:
