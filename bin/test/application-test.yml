spring:
  datasource:
    url: jdbc:tc:postgresql:17:///hiscope_test
    username: hiscope
    password: hiscope
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/common,classpath:db/migration/local
    baseline-on-migrate: true

  thymeleaf:
    cache: false

  security:
    user:
      password: disabled

logging:
  level:
    root: WARN
    com.hiscope: INFO

app:
  bootstrap:
    super-admin:
      enabled: false
