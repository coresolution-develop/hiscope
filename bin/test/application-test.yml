spring:
  datasource:
    url: jdbc:h2:mem:hiscope_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/common,classpath:db/migration/local
    baseline-on-migrate: true

  thymeleaf:
    cache: false

  security:
    user:
      password: disabled

logging:
  level:
    root: WARN
    com.hiscope: INFO

app:
  bootstrap:
    super-admin:
      enabled: false
