<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>비밀번호 변경</title>

  <!-- 정적 리소스 -->
  <link th:href="@{/css/css.css}" rel="stylesheet" type="text/css">
  <link th:href="@{/css/testlogincss.css}" rel="stylesheet" type="text/css">
  <link th:href="@{/css/findpwdcss.css}" rel="stylesheet" type="text/css">
    <link rel="stylesheet" type="text/css" th:href="@{/css/demopwdcss.css?ver=0226}">
  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
  <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
  <style>
    section {
      background: #fcfcfc;
    width: 700px;
    height: 490px;
    border: 1px solid #dfdfdf;
    margin: 0 auto;
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 0;
    }
    .login {
      width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
    flex-wrap: nowrap;
    }
    .login > div {
      border: none;
    }
    ul {
      margin: 0;;
    }
    .line {
      width: 100%;
    background: #1b304a;
    position: relative;
    height: 9px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    top: -95px;
    }
    .login-head {
      width: 100%;
    text-align: center;
    padding: 0px 50px;
    justify-content: space-between;
    align-items: center;
    /* margin-top: 30px; */
        display: flex;
    }
    .nomal {
          padding: 40px 0 0;
    margin-top: 35px;
    }
    ul li input {
      text-indent: 0;
    }
    .login > ul li input[type=text], input[type=password] {
    width: 600px;
    height: 56px;
    text-indent: 0;
    border: 1px solid #efefef;
    }
    .login div ul {
      display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    }
    .login > ul li {
    padding: 0;
    }
    .notice {
      width: 100%;
      height: 100px;
      display: flex;
      justify-content: center;
    }
    .notice-area {
      width: 600px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    flex-direction: column;
    align-content: flex-start;
    }
  </style>
</head>
<body>
<form th:action="@{/pwd/find}" method="post">
  <section id="section">
    <div class="login">
      <!-- 윗 파란 라인 (pwd.html 과 동일) -->
      <div class="line"></div>

      <!-- 헤더 영역 (뒤로가기 + 제목) -->
      <div class="login-head">
        <div class="head-img-area"
             th:onclick="|location.href='@{/login}'|">
          <img th:src="@{/icon/arrow2.png}" alt="뒤로가기">
        </div>
        <div class="head-span-area">
          <span class="bold">비밀번호 변경</span>
        </div>
      </div>

      <!-- 안내문 + 입력폼 -->
      <ul class="normal">
        <li>
          <p style="text-align:center; font-size: 1.6rem;">
            사번과 본인휴대폰번호를 입력 후 정보확인을 눌러주세요.
          </p>
        </li>
        <li style="margin-bottom: 10px;">
          <input type="text" name="id" id="id" placeholder="사번" title="사번입력">
        </li>
        <li style="margin-bottom: 10px;">
          <input type="text" name="ph" id="ph" placeholder="휴대폰번호" title="휴대폰번호입력">
        </li>
        <li>
          <button type="button" id="find" class="bold">정보확인</button>
        </li>
      </ul>

      <!-- AJAX 결과 영역 (비번 변경 UI가 여기에 들어감) -->
      <div id="result"></div>
    </div>

    <!-- 문의사항 영역 (그대로 유지, 필요하면 스타일만 조정) -->
    <div class="notice">
        <div class="notice-area">
          <p style="font-size:1.8rem;"><b>문의사항</b></p>
          <div style="color:blue; font-size: 1.4rem;">
            <p>코어솔루션 전준호 팀장 063-250-4506</p>
            <p>코어솔루션 이수민 주임 063-250-4545</p>
            <p>비상연락처 (전준호) 010-4454-8201</p>
            <p style="font-size:12px;">
              ※ 문자로 내용(소속,부서,사원명 포함) 남겨주시면 확인 후 바로 조치하도록 하겠습니다.
            </p>
          </div>
        </div>
      
    </div>

  </section>
</form>

<!-- JS: Thymeleaf 인라인 -->
<script th:inline="javascript">
  const URL_FIND   = /*[[@{/pwd/find-ajax}]]*/ '';
  const YEAR       = /*[[${year}?:2025]]*/ 2025;
  const URL_PWDACT = /*[[@{/pwd/act/}]]*/ '';
  const URL_LOGIN  = /*[[@{/login}]]*/ '';

  $(document).ready(function () {
    $("#id,#ph").on('focus', function(){
      $('#section').css('height', '490px');
      $('.line').css('top', '-94px');
      $("#id").css('border','1px solid #efefef');
      $("#ph").css('border','1px solid #efefef');
      $("#result").html('');
    });

    // 정보확인
    $("#find").on('click', function () {
      let id = $("#id").val().trim();
      let ph = $("#ph").val().trim();
      if (ph.length === 11) ph = ph.slice(0,3) + '-' + ph.slice(3,7) + '-' + ph.slice(7);

      console.log("id : "+id+", ph : "+ph+", year : "+YEAR);
      $.ajax({
        url: URL_FIND,
        type: 'post',
        dataType: 'json',
        data: { id, ph, year: YEAR },
        success: function (res) {
          console.log('res =', res);
          console.log('res.result =', res.result);
          console.log('as JSON =', JSON.stringify(res));

          if (res.success === true) {
            // ===== 여기 HTML을 pwd.html 스타일에 맞게 수정 =====
            $("#section").css('height', '670px'); // 섹션 높이 조정
            $(".line").css('top', '-72px'); // 라인 위치 조정
            $("#result").css('width', '100%').css('display', 'flex').css('flex-wrap', 'wrap').css('justify-content', 'center').css('align-items', 'center');
            $("#result").css('color', '#000').html(`
              <p style="width: 600px; text-align:left; margin-top: 10px; margin-bottom:10px; color: orange; font-weight: bold; font-size: 1.6rem;">
                새로운 비밀번호를 설정해주세요.
              </p>
              <ul class="normal">
                <li style="margin-bottom:10px;">
                  <input type="password" placeholder="비밀번호" name="pwd" id="pwd">
                </li>
                <li style="margin-bottom:10px;">
                  <input type="password" placeholder="비밀번호확인" name="pwd2" id="pwd2">
                </li>
                <li style="">
                  <button type="button" id="pwdAct" class="bold" style="width: 600px;">비밀번호 변경</button>
                </li>
              </ul>
            `);
          } else {
            $("#result").css('color','red').css('display', 'flex').css('flex-wrap', 'wrap').css('justify-content', 'center').css('align-items', 'center').css('font-size', '1.6rem').css('padding-top', '10px').text('검색된 정보가 없습니다. 사번과 휴대폰번호를 확인해주세요.');
            $("#id,#ph").css('border','1px solid red');
            $(".line").css('top', '-81px');
          }
        },
        error: function (e) { console.error(e); }
      });
    });

    // 비밀번호 변경
    $(document).on('click', '#pwdAct', function () {
      let id   = $("#id").val().trim();
      let pwd  = $("#pwd").val();
      let pwd2 = $("#pwd2").val();

      if (!pwd)  return alert("비밀번호를 입력해주세요.");
      if (!pwd2) return alert("비밀번호 확인을 입력해주세요.");
      if (pwd !== pwd2) {
        alert("비밀번호가 일치하지 않습니다.");
        $("#pwd2").focus();
        return;
      }

      $.ajax({
        url: URL_PWDACT + encodeURIComponent(id),
        type: 'post',
        dataType: 'json',
        data: { id, pwd },
        success: function (res) {
          if (res.result === "Y") {
            alert("비밀번호를 변경했습니다. 변경된 비밀번호로 로그인 해주세요.");
          } else {
            alert("비밀번호 변경 중 오류가 발생했습니다. 관리자에게 문의하세요.");
          }
          location.replace(URL_LOGIN);
        },
        error: function (e) { console.error(e); }
      });
    });
  });
</script>
</body>
</html>
