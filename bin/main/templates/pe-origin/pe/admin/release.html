<body>
    <div th:replace="~{Include/layout :: header}"></div>
    <div th:replace="~{Include/layout :: nav_section}"></div>
    <div class="main-content">
        <div class="main-inner">
            <section class="card">
                <h2>결과 공개 설정</h2>

                <div style="max-width:760px;">
                <div style="display:flex; gap:10px; align-items:center; margin:10px 0;">
                    <select class="custom" id="year" style="margin: 0;">
                        <option th:each="y : ${#numbers.sequence(2023, 2025)}"
                        th:value="${y}" th:text="${y}"
                        th:selected="${y} == ${year}"></option>
                    </select>

                    <span id="state-badge" class="btn-css" style="padding:6px 10px; min-width:120px;">상태: -</span>
                </div>

                <form id="gate-form" class="infotable" style="padding:12px;">
                    <div style="display:grid; grid-template-columns:160px 1fr; gap:10px; align-items:center;">
                    <label for="openAt"><b>공개 시작</b></label>
                    <input type="datetime-local" id="openAt" name="openAt" required>

                    <label for="closeAt">공개 종료(선택)</label>
                    <input type="datetime-local" id="closeAt" name="closeAt">

                    <label for="enabled">사용 여부</label>
                    <input type="checkbox" id="enabled" name="enabled" checked>
                    </div>

                    <div style="margin-top:12px; display:flex; gap:8px;">
                    <button type="submit" class="btn-css" style="height:42px; padding:0 16px;">저장</button>
                    <button type="button" id="reload" class="btn-css" style="height:42px; padding:0 16px;">새로고침</button>
                    </div>
                </form>

                <p style="margin-top:10px; color:#666;">
                    * 모든 시각은 <b>Asia/Seoul</b> 기준으로 저장/비교됩니다.
                </p>
                </div>
            </section>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
	<div th:replace="~{Include/layout :: scripts}"></div>
    <script th:src="@{/js/admin/admin.js}"></script>
<script>
(function(){
  const $ = (s, r=document)=>r.querySelector(s);
  const yearSel = $('#year');
  const openAt  = $('#openAt');
  const closeAt = $('#closeAt');
  const enabled = $('#enabled');
  const badge   = $('#state-badge');
  const form    = $('#gate-form');
  const reload  = $('#reload');

  const setBadge = (openNow) => {
    badge.textContent = '상태: ' + (openNow ? '공개중' : '비공개');
    badge.style.background = openNow ? '#e6fff2' : '#fff5f5';
    badge.style.border = '1px solid ' + (openNow ? '#22c55e' : '#e11d48');
    badge.style.color = openNow ? '#166534' : '#9f1239';
  };

  const toLocalInputValue = (isoOrNull) => {
    if(!isoOrNull) return '';
    // 서버에서 LocalDateTime 직렬화가 '2025-12-20T09:00:00' 라면 그대로 사용
    // 초 단위 제거
    return (isoOrNull.length >= 16) ? isoOrNull.substring(0,16) : isoOrNull;
  };

  async function fetchGate(){
    const y = yearSel.value;
    const res = await fetch(`/admin/release/api/gate?year=${y}`, {credentials:'same-origin'});
    if(!res.ok){ alert('설정 조회 실패'); return; }
    const js = await res.json();
    if(!js.exists){
      openAt.value = ''; closeAt.value = ''; enabled.checked = true;
      setBadge(false);
      return;
    }
    const d = js.data;
    openAt.value  = toLocalInputValue(d.openAt);
    closeAt.value = toLocalInputValue(d.closeAt);
    enabled.checked = !!d.enabled;
    setBadge(!!js.openNow);
  }

  async function saveGate(e){
    e.preventDefault();
    const y  = yearSel.value;
    const oa = openAt.value;   // 'yyyy-MM-ddTHH:mm'
    const ca = closeAt.value;  // or ''
    if(!oa){ alert('공개 시작 시각을 입력하세요.'); return; }

    const formData = new URLSearchParams();
    formData.append('year', y);
    formData.append('openAt', oa);
    if(ca) formData.append('closeAt', ca);
    formData.append('enabled', enabled.checked ? 'true' : 'false');

    const res = await fetch('/admin/release/api/gate', {
      method:'POST',
      headers: {'Content-Type':'application/x-www-form-urlencoded'},
      body: formData.toString(),
      credentials:'same-origin'
    });
    if(!res.ok){ alert('저장 실패'); return; }
    const js = await res.json();
    if(js.ok){
      alert('저장되었습니다.');
      fetchGate();
    } else {
      alert('저장 실패');
    }
  }

  yearSel.addEventListener('change', fetchGate);
  form.addEventListener('submit', saveGate);
  reload.addEventListener('click', fetchGate);

  // 초기 로드
  fetchGate();
})();
</script>
