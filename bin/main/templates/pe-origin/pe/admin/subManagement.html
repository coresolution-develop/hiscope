<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="data-collapsed=${sidebarCollapsed ? 'true' : 'false'}"
      th:styleappend="|--nav-w:${sidebarCollapsed ? '70px' : '240px'}|">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="코어솔루션 인사평가시스템">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hr.sosyge.net/pe/login">
  <meta property="og:image" content="/resources/Sharing/img/core_icon_big.png">
  <meta property="og:description" content="코어솔루션 인사평가시스템">
  <title>관리자페이지</title>

  <link rel="stylesheet" th:href="@{/css/css.css}">
  <link rel="stylesheet" th:href="@{/css/alertcss.css}">
  <link rel="stylesheet" th:href="@{/css/demoheadercss.css}">
  <link rel="stylesheet" th:href="@{/css/leftMenu.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
	<link rel="stylesheet" th:href="@{/css/Include/spinner.css}" />
  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
  <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
  <link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">

  <style>
    :root { --nav-w:240px; --container-max:1100px; }

    .main-content { margin-left:var(--nav-w); background:#f7f7f7; min-height:100vh; padding:0 0 30px; }
    .main-inner   { max-width:var(--container-max); margin:0 auto; padding:20px; }

    /* 카드 */
    .card{ background:#fff; border:1px solid #eee; border-radius:10px; box-shadow:0 2px 10px rgba(0,0,0,.06); padding:20px 24px; margin-bottom:24px; }
    .card h2{ margin:0 0 12px; font-size:20px; color:#2a384a; }
    .scroll-container p{ margin:4px 0; color:#444; line-height:1.5; }

    /* 버튼/폼 레이아웃 */
    .excel-form{ display:grid; grid-auto-flow:column; grid-auto-columns:max-content; gap:12px 16px; align-items:center; justify-content:start; }
    @media (max-width:1200px){ .excel-form{ grid-auto-flow:row; grid-template-columns:1fr; justify-items:start; } }
    .btn-file{ margin-right:8px; }
    .file-name{ margin:0 12px; color:#666; font-size:13px; }

    /* 버튼 */
    .white-btn:hover{ background:#f8f9fa; transform:translateY(-1px); box-shadow:0 6px 18px rgba(0,0,0,.12); }
    .orange-btn:hover{ filter:brightness(.96); transform:translateY(-1px); box-shadow:0 6px 18px rgba(0,0,0,.12); }
    .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

    /* 테이블 래퍼(둥근 모서리) */
    .table-wrap{ border:1px solid #e2e8f0; border-radius:10px; overflow:hidden; }
    .data-table{ width:100%; border-collapse:separate; border-spacing:0; font-size:13px; table-layout:fixed; }
    .data-table th,.data-table td{ border:0; padding:10px 12px; text-align:left; white-space:normal; word-break:break-word; text-align: center; }
    .data-table thead th{ position:sticky; top:0; z-index:1; background:#f3f5f8; font-weight:600; border-bottom:1px solid #e5e7eb; }
    .data-table tbody td{ border-top:1px solid #f0f2f5; }
    .data-table tbody tr:nth-child(even) td{ background:#fafbfc; }
    .data-table tbody tr:hover td{ background:#f1f6ff; }

    /* 열 폭(선택) */
    .data-table th:nth-child(1), .data-table td:nth-child(1){ min-width:220px; } /* 부서명 */
    .data-table th:nth-child(2), .data-table td:nth-child(2){ min-width:160px; } /* 부서코드 */
	/* 시각적 숨김(접근성 유지) */
.visually-hidden{
  position:absolute !important; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}

/* 카드 헤더 정렬 */
.card-head{ display:flex; align-items:center; justify-content:space-between; gap:8px;
    margin-bottom: 10px; }
.card-head h2{ margin:0; }

/* 접근성용 숨김 */
.visually-hidden{
  position:absolute !important; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}

/* ? 버튼 */
.help-btn{
  width:28px; height:28px; border-radius:50%;
  border:1px solid #d0d7de; background:#fff; color:#1b304a; font-weight:700;
  display:inline-flex; align-items:center; justify-content:center; cursor:pointer;
}
.help-btn:hover{ background:#f8f9fa; }

/* 다이얼로그 */
.help-dialog[hidden]{ display:none; }
.help-dialog{
  position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center;
}
.help-dialog__backdrop{
  position:absolute; inset:0; background:rgba(0,0,0,.35);
}
.help-dialog__panel{
  position:relative; width:min(640px, 92vw); background:#fff; border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.25); border:1px solid #e5e7eb;
  overflow:hidden; animation:help-pop .16s ease-out;
}
@keyframes help-pop{ from{ transform:translateY(6px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
.help-dialog__header{
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:14px 16px; border-bottom:1px solid #eef1f5;
}
.help-dialog__header h3{ margin:0; font-size:16px; color:#2a384a; }
.help-dialog__close{
  border:0; background:transparent; font-size:24px; line-height:1; cursor:pointer; color:#667085;
}
.help-dialog__close:hover{ color:#344054; }
.help-dialog__body{
  padding:16px; color:#444; font-size:14px; line-height:1.55;
}
.help-dialog__body p{ margin:6px 0; }
/* 카드 등장 애니메이션 */
@keyframes card-rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 초기 상태: 보이지 않게 */
.card {
  opacity: 0;
  transform: translateY(14px);
}

/* 페이지 준비되면 실행 */
.page-ready .card {
  animation: card-rise .32s ease-out both;
}

/* 여러 카드가 있으면 살짝씩 지연 (스태거) */
.page-ready .card:nth-of-type(2) { animation-delay: .05s; }
.page-ready .card:nth-of-type(3) { animation-delay: .10s; }
.page-ready .card:nth-of-type(4) { animation-delay: .15s; }

/* 모션 최소화 환경에선 애니메이션 비활성화 */
@media (prefers-reduced-motion: reduce) {
  .card, .page-ready .card { animation: none !important; opacity: 1; transform: none; }
}
  </style>
</head>
<body>
  <div th:replace="~{Include/layout :: header}"></div>
  <div th:replace="~{Include/layout :: nav_section}"></div>

  <div class="main-content">
    <div class="main-inner">

      <div class="card">
        <div class="card-head">
    <h2>부서정보 엑셀 업로드</h2>

    <!-- 도움말 버튼 -->
    <button type="button" class="help-btn"
            aria-label="업로드 안내 보기"
            aria-haspopup="dialog"
            aria-controls="upload-help-modal">
      ?
    </button>
  </div>

  <!-- ✔ 기존 scroll-container 내용은 숨김 컨테이너로 보관 -->
  <div id="upload-help-content" class="visually-hidden">
    <p>1. 엑셀 템플릿을 다운로드 받아서 작성 후 업로드 해주세요.</p>
    <p>2. 엑셀 파일의 첫번째 시트만 인식합니다.</p>
    <p>3. 엑셀 파일의 B3열 부터 인식합니다.</p>
    <p>4. 엑셀 파일의 양식이 맞지 않으면 업로드가 실패할 수 있습니다.</p>
    <p>5. 업로드된 데이터는 아래에서 확인할 수 있습니다.</p>
    <p>6. 업로드된 데이터를 초기화하려면 '데이터 초기화' 버튼을 눌러주세요. (복구 불가)</p>
  </div>

        <div class="excel-form">
          <form th:action="@{/excel/subtemplate}" method="get">
            <button class="orange-btn" type="submit">템플릿 다운로드</button>
          </form>

          <form th:action="@{/excel/subupload}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="year" th:value="${year}" />
            <input class="sr-only" id="excelFile" type="file" name="file" accept=".xlsx,.xls">
            <label for="excelFile" class="white-btn btn-file">파일 선택</label>
            <span id="excelFileName" class="file-name">선택된 파일 없음</span>
            <button class="white-btn" type="submit" id="submitBtn">엑셀 업로드</button>
          </form>

          <form th:action="@{/excel/subManagementreset}" method="post"
                onsubmit="return confirm('정말 해당 연도의 부서 데이터를 초기화하시겠습니까?');">
            <input type="hidden" name="year" th:value="${year}" />
            <button type="submit" class="orange-btn">부서 데이터 초기화</button>
          </form>
        </div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>부서명</th>
                <th>부서코드</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="s : ${subList}">
                <td th:text="${s.subName}">부서명</td>
                <td th:text="${s.subCode}">부서코드</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
<!-- 도움말 다이얼로그 -->
<div id="upload-help-dialog" class="help-dialog" role="dialog" aria-modal="true"
     aria-labelledby="upload-help-title" hidden>
  <div class="help-dialog__backdrop"></div>
  <div class="help-dialog__panel" role="document">
    <div class="help-dialog__header">
      <h3 id="upload-help-title">업로드 안내</h3>
      <button type="button" class="help-dialog__close" aria-label="닫기">&times;</button>
    </div>
    <div class="help-dialog__body" id="upload-help-body"></div>
  </div>
</div>

  <!-- 스피너 오버레이 -->
<div id="spinner-overlay" style="display:none;">
  <div class="spinner-container">
    <div class="spinner"></div>
    <p>잠시만 기다려주세요</p>
  </div>
</div>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <div th:replace="~{Include/layout :: scripts}"></div>
  <script th:src="@{/js/admin/admin.js}"></script>
  <script>
    // 파일명 표시
    (function(){
      const input = document.getElementById('excelFile');
      const nameSpan = document.getElementById('excelFileName');
      if(!input || !nameSpan) return;
      input.addEventListener('change', () => {
        nameSpan.textContent = (input.files && input.files[0]) ? input.files[0].name : '선택된 파일 없음';
      });

	  const helpBtn  = document.querySelector('.help-btn');
  const dialog   = document.getElementById('upload-help-dialog');
  const backdrop = dialog?.querySelector('.help-dialog__backdrop');
  const closeBtn = dialog?.querySelector('.help-dialog__close');
  const bodySlot = dialog?.querySelector('#upload-help-body');
  const content  = document.getElementById('upload-help-content');

  if(!helpBtn || !dialog || !bodySlot || !content) return;

  let hoverTimer = null;
  let leaveTimer = null;

  function openDialog(){
    bodySlot.innerHTML = content.innerHTML;
    dialog.hidden = false;
    requestAnimationFrame(()=> closeBtn?.focus());
    document.addEventListener('keydown', onKeydown);
  }
  function closeDialog(){
    dialog.hidden = true;
    document.removeEventListener('keydown', onKeydown);
  }
  function onKeydown(e){
    if(e.key === 'Escape') closeDialog();
  }

  // 클릭/탭
  helpBtn.addEventListener('click', (e)=>{ e.preventDefault(); openDialog(); });
  closeBtn.addEventListener('click', closeDialog);
  backdrop.addEventListener('click', closeDialog);

  // 데스크톱 호버 UX(선택적)
  helpBtn.addEventListener('mouseenter', ()=>{
    clearTimeout(leaveTimer);
    hoverTimer = setTimeout(openDialog, 150);
  });
  helpBtn.addEventListener('mouseleave', ()=>{
    clearTimeout(hoverTimer);
    leaveTimer = setTimeout(()=>{ if(!dialog.matches(':hover')) closeDialog(); }, 120);
  });
  dialog.addEventListener('mouseleave', ()=>{ leaveTimer = setTimeout(closeDialog, 120); });
  dialog.addEventListener('mouseenter', ()=> clearTimeout(leaveTimer));

    })();
	window.addEventListener('DOMContentLoaded', function () {
    document.body.classList.add('page-ready');
  });
  </script>
</body>
</html>
