/* 카드 등장 애니메이션 */
@keyframes card-rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 초기 상태: 보이지 않게 */
.card {
  opacity: 0;
  transform: translateY(14px);
}

/* 페이지 준비되면 실행 */
.page-ready .card {
  animation: card-rise .32s ease-out both;
}

/* 여러 카드가 있으면 살짝씩 지연 (스태거) */
.page-ready .card:nth-of-type(2) { animation-delay: .05s; }
.page-ready .card:nth-of-type(3) { animation-delay: .10s; }
.page-ready .card:nth-of-type(4) { animation-delay: .15s; }

/* 모션 최소화 환경에선 애니메이션 비활성화 */
@media (prefers-reduced-motion: reduce) {
  .card, .page-ready .card { animation: none !important; opacity: 1; transform: none; }
}
/* 스크롤 카드 컨테이너 */
.scroll-card {
  overflow: auto;                 /* 세로/가로 모두 대응 */
  height: calc(100% - 218px);     /* 기존 높이 유지 */
  border: 1px solid #e9ecef;
  border-radius: 8px;
}

/* sticky가 안정적으로 동작하도록 separate 권장 */
.scroll-card table {
  border-collapse: separate;
  border-spacing: 0;
}

/* 헤더 고정 */
.scroll-card thead th {
  position: sticky;
  top: 0;
  z-index: 2;                     /* 본문 셀 위로 */
  background: #fff;               /* 투명 배경 방지 */
  /* 살짝 그림자 주면 고정 느낌 좋음(선택) */
  box-shadow: 0 1px 0 0 #e9ecef, 0 2px 6px rgba(0,0,0,.03);
}

/* 첫 행/첫 열 경계선 유지(옵션) */
.scroll-card th, .scroll-card td {
  border-bottom: 1px solid #eee;
}

/* (옵션) 첫 번째 컬럼도 고정하고 싶다면 주석 해제 
#tbl th:first-child,
#tbl td:first-child {
  position: sticky;
  left: 0;
  z-index: 3;       
  background: #fff;
  box-shadow: 1px 0 0 #e9ecef;
}
*/

/* iOS 사파리 스크롤 부드럽게(옵션) */
.scroll-card {
  -webkit-overflow-scrolling: touch;
  height: 100%;
}
.scroll-card{ position: relative; overflow:auto; }
.scroll-card table{ border-collapse: separate; border-spacing:0; }

.scroll-card thead{ position: sticky; top:0; z-index:3; background:#fff; }
.scroll-card thead th{
  position: sticky; top:0; z-index:4;
  background:#fff;                 /* 투명 X */
  box-shadow: 0 1px 0 #e9ecef, 0 2px 6px rgba(0,0,0,.03); /* 경계감 */
}
.table-card { padding: 0; height: calc(100% - 218px);}                 /* 테이블 카드 패딩 제거(선택) */
.table-wrap { display: flex; flex-direction: column; height: 100%;}

/* 헤더는 고정, 그림자/경계 */
.tbl-head thead th{
  position: sticky;
  top: 0;
  z-index: 2;
  box-shadow: 0 1px 0 #e9ecef, 0 2px 6px rgba(0, 0, 0, .03);
  border: none;
}

.tbl { width:100%; border-collapse: separate; border-spacing:0; table-layout: fixed; }
.tbl th,.tbl td { padding:10px; border-bottom:1px solid #eee; text-align:center; font-size:12px; }
.tbl tr:last-child {

	<div th:replace="~{Include/layout :: scripts}"></div>
 <script>
  const fmt   = n => n?.toLocaleString?.('ko-KR') ?? n;
  const form  = document.getElementById('f');
  const tbody = document.getElementById('tbl-body'); // 기존 '#tbl tbody' 대신
  const modal = document.getElementById('modal');
  const modalBody = document.getElementById('modal-body');
  document.getElementById('modal-close').onclick = () => modal.style.display='none';

  // 🔹 이 페이지 전용 스피너 제어 함수 (이름 겹치지 않게)
  const spinnerOverlay = document.getElementById('spinner-overlay');
  const showOrgSpinner = () => { spinnerOverlay?.classList.add('show'); };
  const hideOrgSpinner = () => { spinnerOverlay?.classList.remove('show'); };

  function load() {
    const p = new URLSearchParams(new FormData(form)); // page/size 없음

    showOrgSpinner();   // ✅ 로딩 시작 시 스피너 ON

    fetch('/api/admin/progress/org/members?' + p.toString())
      .then(r => r.json())
      .then(d => {
        document.getElementById('kNeed').textContent = fmt(d.summary.needPairs);
        document.getElementById('kDone').textContent = fmt(d.summary.donePairs);
        document.getElementById('kProg').textContent = (d.summary.progress || 0) + '%';

        tbody.innerHTML = '';
        d.rows.forEach(r => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${r.targetId}</td>
            <td>${r.targetName}</td>
            <td>${r.position || ''}</td>
            <td>${r.deptName || ''} <span style="color:#999">(${r.subCode || ''})</span></td>
            <td>${fmt(r.needPairs)}</td>
            <td>${fmt(r.donePairs)}</td>
            <td>${fmt(r.pendingPairs)}</td>
            <td>
              <div class="progress"><div class="bar" style="width:${r.progress}%"></div></div>
              <div class="right">${r.progress}%</div>
            </td>
            <td>${r.updatedAt ?? ''}</td>
          `;
          tbody.appendChild(tr);
        });
      })
      .catch(e => {
        alert('로드 실패: ' + e);
      })
      .finally(() => {
        hideOrgSpinner(); // ✅ 성공/실패 상관없이 마지막에 스피너 OFF
      });
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    load();
  });

  // 첫 진입 시 자동 로드
  load();
</script>
