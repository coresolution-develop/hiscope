<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - 다면평가 시스템</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@1.0/nanumsquare.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(27,48,74,.95), rgba(47,66,90,.88)), url('/images/pe/login_bg2.png') center/cover no-repeat;
        }
        .password-card { border: 1px solid rgba(255,255,255,.15); border-radius: 1rem; box-shadow: 0 1rem 2rem rgba(0,0,0,.2); }
        .brand-logo { height: 28px; margin-bottom: .8rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card password-card">
                <div class="card-body p-4 p-md-5">
                    <img src="/images/pe/core_logo2.png" alt="PE Brand" class="brand-logo">
                    <h4 class="fw-bold mb-2">비밀번호 변경</h4>
                    <p class="text-muted mb-4" th:if="${mustChangePassword}">
                        임시 비밀번호로 로그인했습니다. 계속 사용하려면 새 비밀번호로 변경해주세요.
                    </p>
                    <p class="text-muted mb-4" th:unless="${mustChangePassword}">
                        보안을 위해 비밀번호를 변경합니다.
                    </p>

                    <div th:if="${errorMessage}" class="alert alert-danger py-2">
                        <span th:text="${errorMessage}">오류 메시지</span>
                    </div>

                    <form th:action="@{/auth/change-password}" method="post" th:object="${request}">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">새 비밀번호</label>
                            <input type="password" th:field="*{newPassword}" class="form-control"
                                   th:classappend="${#fields.hasErrors('newPassword')} ? ' is-invalid' : ''"
                                   th:placeholder="|최소 ${passwordMinLength}자 이상|" autocomplete="new-password" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">새 비밀번호 확인</label>
                            <input type="password" th:field="*{confirmPassword}" class="form-control"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid' : ''"
                                   placeholder="같은 비밀번호를 다시 입력하세요" autocomplete="new-password" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-semibold">비밀번호 변경</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
