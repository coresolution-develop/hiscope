<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 다면평가 시스템</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@1.0/nanumsquare.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, rgba(27,48,74,.95), rgba(47,66,90,.88)), url('/images/pe/login_bg2.png') center/cover no-repeat;
        }
        .login-card { border: 1px solid rgba(255,255,255,.2); border-radius: 1rem; box-shadow: 0 1rem 2.5rem rgba(0,0,0,.25); }
        .login-header { background: #1b304a; border-radius: 1rem 1rem 0 0; padding: 1.5rem 2rem; text-align: center; }
        .login-logo { height: 30px; margin-bottom: .6rem; }
        /* Prevent iOS auto-zoom on input focus */
        @media (max-width: 575.98px) {
          .form-control { font-size: 16px; }
          .login-header { padding: 1.25rem 1.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-9 col-md-5 col-lg-4">
            <div class="card login-card">
                <div class="login-header">
                    <img src="/images/pe/core_logo2.png" alt="PE Brand" class="login-logo">
                    <h4 class="text-white mb-1 fw-bold">다면평가 시스템</h4>
                    <p class="text-white-50 mb-0 small">Performance Evaluation</p>
                </div>
                <div class="card-body p-3 p-sm-4">
                    <div th:if="${param.error}" class="alert alert-danger py-2 small">
                        <i class="bi bi-exclamation-triangle me-1"></i>로그인 ID 또는 비밀번호가 올바르지 않습니다.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info py-2 small">
                        로그아웃되었습니다.
                    </div>
                    <div th:if="${param.expired}" class="alert alert-warning py-2 small">
                        세션이 만료되었습니다. 다시 로그인해주세요.
                    </div>
                    <form method="post" action="/login">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">기관 코드 (선택)</label>
                            <input type="text" name="orgCode" class="form-control" placeholder="예: KIDR (슈퍼관리자는 비워도 됨)">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">로그인 ID</label>
                            <input type="text" name="loginId" class="form-control" placeholder="로그인 ID를 입력하세요" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold small">비밀번호</label>
                            <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>로그인
                        </button>
                    </form>
                    <hr class="my-3">
                    <div class="text-center small text-muted">
                        <strong>테스트 계정</strong><br>
                        슈퍼관리자: super / 123qwe<br>
                        <!-- 기관관리자: admin / password123<br>
                        직원: emp001~emp010 / password123 -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
