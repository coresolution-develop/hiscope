<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>오류 발생</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card border-0 shadow-sm p-4">
                <i class="bi bi-exclamation-triangle-fill text-danger display-1 mb-3"></i>
                <h3 class="fw-bold" th:text="'오류 ' + ${httpStatus}">오류</h3>
                <p class="text-muted" th:text="${errorMessage}">오류가 발생했습니다.</p>
                <p class="small text-muted mb-0" th:if="${requestId}">
                    요청 ID: <code th:text="${requestId}">-</code>
                </p>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>이전 페이지
                    </a>
                    <a href="/" class="btn btn-primary">홈으로</a>
                </div>
            </div>
        </div>
    </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
