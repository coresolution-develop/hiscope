spring:
  datasource:
    url: ${DB_URL:jdbc:h2:file:./build/h2db/hiscope_local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.h2.Driver}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    locations: classpath:db/migration/common,classpath:db/migration/local

logging:
  level:
    com.hiscope: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  bootstrap:
    super-admin:
      enabled: true
      login-id: ${APP_BOOTSTRAP_SUPER_ADMIN_LOGIN_ID:super}
      password: ${APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD:password123}
      name: ${APP_BOOTSTRAP_SUPER_ADMIN_NAME:슈퍼관리자}
      email: ${APP_BOOTSTRAP_SUPER_ADMIN_EMAIL:super@system.com}
