spring:
  application:
    name: hiscope-evaluation
  profiles:
    default: local

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration/common
    baseline-on-migrate: true

  thymeleaf:
    cache: true
    encoding: UTF-8

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      resolve-lazily: true

  security:
    user:
      password: disabled

server:
  port: ${SERVER_PORT:8099}
  forward-headers-strategy: framework
  servlet:
    context-path: /
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax

logging:
  file:
    path: ${LOG_DIR:./logs}
  level:
    root: INFO
    com.hiscope: INFO
    AUDIT: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  bootstrap:
    super-admin:
      enabled: ${APP_BOOTSTRAP_SUPER_ADMIN_ENABLED:false}
      login-id: ${APP_BOOTSTRAP_SUPER_ADMIN_LOGIN_ID:super}
      password: ${APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD:change-me}
      name: ${APP_BOOTSTRAP_SUPER_ADMIN_NAME:슈퍼관리자}
      email: ${APP_BOOTSTRAP_SUPER_ADMIN_EMAIL:super@system.local}
  upload:
    max-file-size-bytes: ${APP_UPLOAD_MAX_FILE_SIZE_BYTES:10485760}
    allowed-extensions:
      - xlsx
  operations:
    upload-history-view-limit: ${APP_UPLOAD_HISTORY_VIEW_LIMIT:1000}
