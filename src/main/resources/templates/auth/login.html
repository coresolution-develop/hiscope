<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - 다면평가 시스템</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { border: none; border-radius: 1rem; box-shadow: 0 1rem 3rem rgba(0,0,0,.3); }
        .login-header { background: linear-gradient(135deg, #0d6efd, #0dcaf0); border-radius: 1rem 1rem 0 0; padding: 2rem; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4 col-sm-8">
            <div class="card login-card">
                <div class="login-header">
                    <h4 class="text-white mb-1 fw-bold">다면평가 시스템</h4>
                    <p class="text-white-50 mb-0 small">Multi-Evaluation System</p>
                </div>
                <div class="card-body p-4">
                    <div th:if="${param.error}" class="alert alert-danger py-2 small">
                        <i class="bi bi-exclamation-triangle me-1"></i>로그인 ID 또는 비밀번호가 올바르지 않습니다.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info py-2 small">
                        로그아웃되었습니다.
                    </div>
                    <form method="post" action="/login">
                        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">로그인 ID</label>
                            <input type="text" name="loginId" class="form-control" placeholder="로그인 ID를 입력하세요" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold small">비밀번호</label>
                            <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>로그인
                        </button>
                    </form>
                    <hr class="my-3">
                    <div class="text-center small text-muted">
                        <strong>테스트 계정</strong><br>
                        슈퍼관리자: super / password123<br>
                        기관관리자: admin / password123<br>
                        직원: emp001~emp010 / password123
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
