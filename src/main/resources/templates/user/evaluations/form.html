<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::scripts}, ~{::headExtra})}">
<head><title>평가 작성</title></head>
<th:block th:fragment="headExtra">
<style>
.question-card { border-left: 4px solid var(--pe-accent); }
.score-btn { min-width: 44px; min-height: 44px; }
.score-btn.active { background: var(--pe-brand-900); color: white; border-color: var(--pe-brand-900); }
@media (max-width: 575.98px) {
  .score-btn { min-width: 40px; min-height: 40px; padding: 0.25rem 0.4rem; }
  .eval-header { flex-direction: column; align-items: flex-start !important; }
  .eval-header .ms-auto { margin-left: 0 !important; }
  .submit-card-body { flex-direction: column; align-items: stretch !important; }
  .submit-btns { flex-direction: column; }
  .submit-btns .btn { width: 100%; }
}
</style>
</th:block>
<th:block th:fragment="content">
<div class="d-flex align-items-center gap-2 mb-4 flex-wrap eval-header">
    <a href="/user/evaluations" class="btn btn-outline-secondary btn-sm flex-shrink-0"><i class="bi bi-arrow-left"></i></a>
    <div>
        <h4 class="mb-0 fw-bold">평가 작성</h4>
        <small class="text-muted">
            피평가자: <strong th:text="${evaluatee.name}"></strong>
            (<span th:text="${evaluatee.departmentName} ?: '-'"></span> /
            <span th:text="${evaluatee.jobTitle} ?: '-'"></span>)
        </small>
    </div>
    <div class="ms-auto">
        <span th:text="${assignment.status == 'PENDING'} ? '미제출' : '제출완료'"
              th:class="${assignment.status == 'PENDING'} ? 'badge bg-warning text-dark fs-6' : 'badge bg-success fs-6'"></span>
    </div>
</div>

<form id="evalForm">
    <th:block th:each="category, cStat : ${groupedQuestions}">
        <div class="card mb-3 question-card">
            <div class="card-header fw-semibold bg-transparent">
                <i class="bi bi-tag me-1 text-primary"></i>
                <span th:text="${category.key}"></span>
            </div>
            <div class="card-body">
                <th:block th:each="q, qStat : ${category.value}">
                    <div class="mb-4">
                        <p class="fw-semibold mb-2">
                            <span th:text="${qStat.count}" class="text-muted me-2"></span>
                            <span th:text="${q.content}"></span>
                        </p>
                        <!-- 척도형 -->
                        <div th:if="${q.questionType == 'SCALE'}" class="d-flex gap-2 flex-wrap">
                            <th:block th:each="score : ${#numbers.sequence(1, q.maxScore)}">
                                <button type="button"
                                        th:class="${savedScores[q.id] != null and savedScores[q.id] == score} ? 'btn btn-primary score-btn' : 'btn btn-outline-secondary score-btn'"
                                        th:attr="data-qid=${q.id}, data-score=${score}"
                                        th:text="${score}"
                                        onclick="selectScore(this)"></button>
                            </th:block>
                            <input type="hidden" th:name="'scores[' + ${q.id} + ']'"
                                   th:id="'score_' + ${q.id}"
                                   th:value="${savedScores[q.id]}">
                            <small class="text-muted align-self-center">
                                (1=매우 부족 ~ <span th:text="${q.maxScore}"></span>=매우 우수)
                            </small>
                        </div>
                        <!-- 서술형 -->
                        <div th:if="${q.questionType == 'DESCRIPTIVE'}">
                            <textarea th:name="'texts[' + ${q.id} + ']'"
                                      class="form-control"
                                      rows="4"
                                      placeholder="서술형 답변을 입력해주세요."
                                      th:text="${savedTexts[q.id]}"></textarea>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>
    </th:block>

    <!-- 제출 버튼 영역 -->
    <div class="card">
        <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-2 submit-card-body">
            <div th:if="${response != null and response.finalSubmit}">
                <i class="bi bi-check-circle-fill text-success me-1"></i>
                <span class="text-success fw-semibold">제출 완료된 평가입니다.</span>
            </div>
            <div th:unless="${response != null and response.finalSubmit}" class="text-muted small">
                임시저장 후 최종 제출하실 수 있습니다.
            </div>
            <div class="d-flex gap-2 submit-btns" th:unless="${response != null and response.finalSubmit}">
                <button type="button" class="btn btn-outline-secondary" onclick="submitForm(false)">
                    <i class="bi bi-floppy me-1"></i>임시저장
                </button>
                <button type="button" class="btn btn-primary fw-semibold" onclick="confirmSubmit()">
                    <i class="bi bi-send me-1"></i>최종 제출
                </button>
            </div>
        </div>
    </div>
</form>

<!-- Hidden forms -->
<form id="saveForm" th:action="@{/user/evaluations/{id}/save(id=${assignment.id})}" method="post">
    <div id="saveInputs"></div>
</form>
<form id="submitForm" th:action="@{/user/evaluations/{id}/submit(id=${assignment.id})}" method="post">
    <div id="submitInputs"></div>
</form>
</th:block>
<th:block th:fragment="scripts">
<script>
function selectScore(btn) {
    const qid = btn.dataset.qid;
    const score = btn.dataset.score;
    // 같은 문항의 모든 버튼 초기화
    document.querySelectorAll(`[data-qid="${qid}"]`).forEach(b => {
        b.classList.remove('btn-primary');
        b.classList.add('btn-outline-secondary');
    });
    btn.classList.remove('btn-outline-secondary');
    btn.classList.add('btn-primary');
    document.getElementById('score_' + qid).value = score;
}

function collectFormData() {
    const data = {};
    // scores
    document.querySelectorAll('input[name^="scores["]').forEach(input => {
        if (input.value) data[input.name] = input.value;
    });
    // texts
    document.querySelectorAll('textarea[name^="texts["]').forEach(textarea => {
        if (textarea.value.trim()) data[textarea.name] = textarea.value;
    });
    return data;
}

function submitForm(isFinal) {
    const formId = isFinal ? 'submitForm' : 'saveForm';
    const containerId = isFinal ? 'submitInputs' : 'saveInputs';
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const data = collectFormData();
    for (const [key, value] of Object.entries(data)) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = key;
        input.value = value;
        container.appendChild(input);
    }
    document.getElementById(formId).submit();
}

function confirmSubmit() {
    if (confirm('최종 제출하면 수정이 불가할 수 있습니다. 제출하시겠습니까?')) {
        submitForm(true);
    }
}
</script>
</th:block>
</html>
