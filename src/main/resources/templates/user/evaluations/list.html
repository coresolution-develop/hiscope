<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::scripts}, ~{::headExtra})}">
<head><title>나의 평가</title></head>
<th:block th:fragment="headExtra"></th:block>
<th:block th:fragment="content">
<div class="mb-4">
    <h4 class="fw-bold"><i class="bi bi-pencil-square me-2 text-primary"></i>나의 평가 목록</h4>
</div>
<div class="row g-3">
    <div th:each="a : ${assignments}" class="col-md-6 col-lg-4">
        <div class="card h-100"
             th:class="${a.status == 'PENDING'} ? 'card h-100 border-warning' : 'card h-100'">
            <div class="card-body">
                <div class="d-flex justify-content-between mb-2">
                    <span th:text="${a.status == 'PENDING'} ? '미제출' : '제출완료'"
                          th:class="${a.status == 'PENDING'} ? 'badge bg-warning text-dark' : 'badge bg-success'"></span>
                    <small class="text-muted">세션 #<span th:text="${a.sessionId}"></span></small>
                </div>
                <p class="mb-1 small text-muted">피평가자 ID</p>
                <h6 class="fw-bold" th:text="${a.evaluateeId}"></h6>
                <p class="card-text small text-muted" th:if="${a.submittedAt != null}">
                    제출일: <span th:text="${#temporals.format(a.submittedAt, 'yyyy-MM-dd HH:mm')}"></span>
                </p>
            </div>
            <div class="card-footer bg-transparent">
                <a th:href="@{/user/evaluations/{id}(id=${a.id})}"
                   th:text="${a.status == 'PENDING'} ? '평가 작성하기' : '내용 확인'"
                   th:class="${a.status == 'PENDING'} ? 'btn btn-warning btn-sm w-100 fw-semibold' : 'btn btn-outline-secondary btn-sm w-100'"></a>
            </div>
        </div>
    </div>
    <div class="col-12" th:if="${#lists.isEmpty(assignments)}">
        <div class="text-center text-muted py-5">
            <i class="bi bi-inbox display-1 d-block mb-3"></i>
            배정된 평가가 없습니다.
        </div>
    </div>
</div>
</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
