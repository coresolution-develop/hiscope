<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::scripts}, ~{::headExtra})}">
<head><title>기관 관리</title></head>
<th:block th:fragment="headExtra"></th:block>
<th:block th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold"><i class="bi bi-building me-2 text-primary"></i>기관 관리</h4>
    <a href="/super-admin/organizations/new" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>기관 생성
    </a>
</div>
<div class="card mb-3">
    <div class="card-body">
        <form method="get" action="/super-admin/organizations" class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label small text-muted mb-1">검색</label>
                <input type="text" name="keyword" class="form-control" placeholder="기관명 또는 코드"
                       th:value="${keyword}">
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-1">상태</label>
                <select name="status" class="form-select">
                    <option value="">전체</option>
                    <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">활성</option>
                    <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">비활성</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-1">정렬</label>
                <select name="sortBy" class="form-select">
                    <option value="createdAt" th:selected="${sortBy == 'createdAt'}">생성일</option>
                    <option value="name" th:selected="${sortBy == 'name'}">기관명</option>
                    <option value="code" th:selected="${sortBy == 'code'}">코드</option>
                    <option value="status" th:selected="${sortBy == 'status'}">상태</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-1">정렬방향</label>
                <select name="sortDir" class="form-select">
                    <option value="desc" th:selected="${sortDir == 'desc'}">내림</option>
                    <option value="asc" th:selected="${sortDir == 'asc'}">오름</option>
                </select>
            </div>
            <div class="col-md-1">
                <label class="form-label small text-muted mb-1">건수</label>
                <select name="size" class="form-select">
                    <option value="10" th:selected="${size == 10}">10</option>
                    <option value="20" th:selected="${size == 20}">20</option>
                    <option value="50" th:selected="${size == 50}">50</option>
                </select>
            </div>
            <div class="col-md-2 d-flex gap-2">
                <button type="submit" class="btn btn-primary">검색</button>
                <a href="/super-admin/organizations" class="btn btn-outline-secondary">초기화</a>
            </div>
        </form>
    </div>
</div>
<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead><tr><th>기관명</th><th>코드</th><th>상태</th><th>생성일</th><th width="180">관리</th></tr></thead>
            <tbody>
            <tr th:each="org : ${organizations}">
                <td class="fw-semibold" th:text="${org.name}"></td>
                <td><code th:text="${org.code}"></code></td>
                <td><span th:text="${org.status == 'ACTIVE'} ? '활성' : '비활성'"
                          th:class="${org.status == 'ACTIVE'} ? 'badge bg-success' : 'badge bg-secondary'"></span></td>
                <td th:text="${#temporals.format(org.createdAt, 'yyyy-MM-dd')}"></td>
                <td>
                    <a th:href="@{/super-admin/organizations/{id}(id=${org.id})}" class="btn btn-outline-primary btn-sm me-1">상세</a>
                    <form th:action="@{/super-admin/organizations/{id}/status(id=${org.id})}" method="post" class="d-inline">
                        <input type="hidden" name="status" th:value="${org.status == 'ACTIVE'} ? 'INACTIVE' : 'ACTIVE'"/>
                        <button type="submit" class="btn btn-sm"
                                th:class="${org.status == 'ACTIVE'} ? 'btn-outline-warning btn-sm' : 'btn-outline-success btn-sm'"
                                th:text="${org.status == 'ACTIVE'} ? '비활성화' : '활성화'"
                                onclick="return confirm('상태를 변경하시겠습니까?')"></button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(organizations)}">
                <td colspan="5" class="text-center text-muted py-4">등록된 기관이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="d-flex justify-content-between align-items-center mt-3" th:if="${orgPage != null}">
    <div class="small text-muted">
        총 <span th:text="${orgPage.totalElements}">0</span>건
    </div>
    <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary btn-sm"
           th:classappend="${!orgPage.hasPrevious()} ? ' disabled'"
           th:href="@{/super-admin/organizations(page=${orgPage.hasPrevious() ? orgPage.number - 1 : 0},size=${size},keyword=${keyword},status=${status},sortBy=${sortBy},sortDir=${sortDir})}">이전</a>
        <span class="small text-muted align-self-center"
              th:text="${(orgPage.totalPages == 0 ? 1 : orgPage.number + 1) + ' / ' + (orgPage.totalPages == 0 ? 1 : orgPage.totalPages)}">1 / 1</span>
        <a class="btn btn-outline-secondary btn-sm"
           th:classappend="${!orgPage.hasNext()} ? ' disabled'"
           th:href="@{/super-admin/organizations(page=${orgPage.hasNext() ? orgPage.number + 1 : orgPage.number},size=${size},keyword=${keyword},status=${status},sortBy=${sortBy},sortDir=${sortDir})}">다음</a>
    </div>
</div>
</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
