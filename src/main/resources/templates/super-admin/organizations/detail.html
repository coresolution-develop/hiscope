<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::scripts}, ~{::headExtra})}">
<head><title>기관 상세</title></head>
<th:block th:fragment="headExtra"></th:block>
<th:block th:fragment="content">
<div class="d-flex align-items-center gap-2 mb-4">
    <a href="/super-admin/organizations" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
    <h4 class="mb-0 fw-bold" th:text="${organization.name}"></h4>
    <span th:text="${organization.status == 'ACTIVE'} ? '활성' : '비활성'"
          th:class="${organization.status == 'ACTIVE'} ? 'badge bg-success' : 'badge bg-secondary'"></span>
</div>
<div class="row g-4">
    <!-- 기관 정보 -->
    <div class="col-md-4">
        <div class="card">
            <div class="card-header fw-semibold">기관 정보</div>
            <div class="card-body">
                <dl class="row mb-0">
                    <dt class="col-5 small text-muted">기관 코드</dt>
                    <dd class="col-7"><code th:text="${organization.code}"></code></dd>
                    <dt class="col-5 small text-muted">조직 유형</dt>
                    <dd class="col-7"><span class="badge text-bg-light border" th:text="${organization.organizationType}"></span></dd>
                    <dt class="col-5 small text-muted">운영 프로파일</dt>
                    <dd class="col-7"><span class="badge text-bg-light border" th:text="${organization.organizationProfile}"></span></dd>
                    <dt class="col-5 small text-muted">등록일</dt>
                    <dd class="col-7 small" th:text="${#temporals.format(organization.createdAt, 'yyyy-MM-dd')}"></dd>
                </dl>
            </div>
        </div>
    </div>
    <!-- 기관 관리자 -->
    <div class="col-md-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="fw-semibold">기관 관리자</span>
                <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addAdminModal">
                    <i class="bi bi-person-plus me-1"></i>관리자 추가
                </button>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>이름</th><th>로그인 ID</th><th>이메일</th><th>상태</th><th>등록일</th><th>관리</th></tr></thead>
                    <tbody>
                    <tr th:each="admin : ${admins}">
                        <td th:text="${admin.name}"></td>
                        <td><code th:text="${admin.loginId}"></code></td>
                        <td th:text="${admin.email}"></td>
                        <td><span th:text="${admin.status == 'ACTIVE'} ? '활성' : '비활성'"
                                  th:class="${admin.status == 'ACTIVE'} ? 'badge bg-success' : 'badge bg-secondary'"></span></td>
                        <td th:text="${#temporals.format(admin.createdAt, 'yyyy-MM-dd')}"></td>
                        <td class="text-nowrap">
                            <button type="button"
                                    class="btn btn-outline-primary btn-sm me-1"
                                    data-bs-toggle="modal"
                                    data-bs-target="#editAdminModal"
                                    th:attr="data-admin-id=${admin.id},data-admin-name=${admin.name},data-admin-email=${admin.email}">
                                수정
                            </button>
                            <form th:action="@{/super-admin/organizations/{orgId}/admins/{adminId}/status(orgId=${organization.id},adminId=${admin.id})}"
                                  method="post"
                                  class="d-inline">
                                <input type="hidden" name="status" th:value="${admin.status == 'ACTIVE'} ? 'INACTIVE' : 'ACTIVE'">
                                <button type="submit"
                                        class="btn btn-sm me-1"
                                        th:class="${admin.status == 'ACTIVE'} ? 'btn-outline-warning btn-sm me-1' : 'btn-outline-success btn-sm me-1'"
                                        th:text="${admin.status == 'ACTIVE'} ? '비활성화' : '활성화'"
                                        onclick="return confirm('관리자 상태를 변경하시겠습니까?')"></button>
                            </form>
                            <form th:action="@{/super-admin/organizations/{orgId}/admins/{adminId}/reset-password(orgId=${organization.id},adminId=${admin.id})}"
                                  method="post"
                                  class="d-inline">
                                <button type="submit"
                                        class="btn btn-outline-secondary btn-sm"
                                        onclick="return confirm('비밀번호를 초기화하시겠습니까?')">비밀번호 초기화</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(admins)}">
                        <td colspan="6" class="text-center text-muted py-3">등록된 관리자가 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 관리자 추가 모달 -->
<div class="modal fade" id="addAdminModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">기관 관리자 추가</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/super-admin/organizations/{id}/admins(id=${organization.id})}" method="post" th:object="${adminRequest}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">이름 *</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="이름">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">로그인 ID *</label>
                        <input type="text" th:field="*{loginId}" class="form-control" placeholder="로그인 ID">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">비밀번호 *</label>
                        <input type="password" th:field="*{password}" class="form-control"
                               th:placeholder="|비밀번호 (${passwordMinLength}자 이상)|">
                        <div class="form-text" th:text="|기관 비밀번호 정책: 최소 ${passwordMinLength}자|"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">이메일</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="이메일">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">추가</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 관리자 수정 모달 -->
<div class="modal fade" id="editAdminModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">기관 관리자 수정</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editAdminForm" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">이름 *</label>
                        <input type="text" name="name" id="editAdminName" class="form-control" placeholder="이름">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">이메일</label>
                        <input type="email" name="email" id="editAdminEmail" class="form-control" placeholder="이메일">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>
</div>
</th:block>
<th:block th:fragment="scripts">
<script th:inline="javascript">
document.addEventListener("DOMContentLoaded", function () {
    const editModal = document.getElementById("editAdminModal");
    if (!editModal) return;
    editModal.addEventListener("show.bs.modal", function (event) {
        const button = event.relatedTarget;
        if (!button) return;
        const adminId = button.getAttribute("data-admin-id");
        const adminName = button.getAttribute("data-admin-name") || "";
        const adminEmail = button.getAttribute("data-admin-email") || "";
        document.getElementById("editAdminName").value = adminName;
        document.getElementById("editAdminEmail").value = adminEmail;
        document.getElementById("editAdminForm").setAttribute(
            "action",
            "/super-admin/organizations/" + [[${organization.id}]] + "/admins/" + adminId + "/update"
        );
    });
});
</script>
</th:block>
</html>
