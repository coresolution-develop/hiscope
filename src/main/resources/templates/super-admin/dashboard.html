<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::scripts}, ~{::headExtra})}">
<head><title>슈퍼관리자 대시보드</title></head>
<body>
<th:block th:fragment="headExtra"></th:block>
<th:block th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold"><i class="bi bi-speedometer2 me-2 text-primary"></i>슈퍼관리자 대시보드</h4>
</div>

<div class="row g-3 mb-4">
    <div class="col-md-3">
        <div class="card text-center p-3">
            <div class="display-4 text-primary fw-bold" th:text="${dashboard.totalOrganizations}">0</div>
            <div class="text-muted small mt-1">전체 기관 수</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center p-3">
            <div class="display-4 text-success fw-bold"
                 th:text="${dashboard.activeOrganizations}">0</div>
            <div class="text-muted small mt-1">활성 기관</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center p-3">
            <div class="display-4 text-secondary fw-bold"
                 th:text="${dashboard.inactiveOrganizations}">0</div>
            <div class="text-muted small mt-1">비활성 기관</div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-center p-3">
            <div class="display-4 text-danger fw-bold"
                 th:text="${dashboard.riskOrganizations}">0</div>
            <div class="text-muted small mt-1">위험 기관 수</div>
            <div class="small text-muted mt-1" th:text="${'최근 7일 실패 ' + dashboard.failedOperationsLast7Days + '건'}">최근 7일 실패 0건</div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span class="fw-semibold"><i class="bi bi-building me-2"></i>기관별 운영 현황</span>
        <a href="/super-admin/organizations/new" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>기관 생성
        </a>
    </div>
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>기관명</th>
                <th>코드</th>
                <th>상태</th>
                <th>사용자 수</th>
                <th>세션(진행중)</th>
                <th>마감경과 세션</th>
                <th>최근7일 실패</th>
                <th>진행중 제출률</th>
                <th>최근 업로드</th>
                <th>최근 오류</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="org : ${dashboard.organizationSummaries}">
                <td><a th:href="@{/super-admin/organizations/{id}(id=${org.organizationId})}" th:text="${org.organizationName}" class="text-decoration-none fw-semibold"></a></td>
                <td><code th:text="${org.organizationCode}"></code></td>
                <td>
                    <span th:text="${org.status}" th:class="${org.status == 'ACTIVE'} ? 'badge bg-success' : 'badge bg-secondary'"></span>
                </td>
                <td th:text="${org.activeUserCount}"></td>
                <td th:text="${org.totalSessionCount + ' (' + org.inProgressSessionCount + ')'}"></td>
                <td>
                    <span class="badge bg-danger" th:if="${org.overdueInProgressSessionCount > 0}" th:text="${org.overdueInProgressSessionCount}">0</span>
                    <span th:if="${org.overdueInProgressSessionCount == 0}">0</span>
                </td>
                <td>
                    <span class="badge bg-danger" th:if="${org.failedOperationsLast7Days > 0}" th:text="${org.failedOperationsLast7Days}">0</span>
                    <span th:if="${org.failedOperationsLast7Days == 0}">0</span>
                </td>
                <td th:text="${org.inProgressSubmissionRate + '%'}"></td>
                <td class="small">
                    <div th:text="${org.recentUploadSummary}">-</div>
                    <div class="text-muted" th:text="${org.recentUploadAt != null ? #temporals.format(org.recentUploadAt, 'MM-dd HH:mm') : '-'}"></div>
                </td>
                <td class="small">
                    <div th:text="${org.recentErrorSummary}">최근 오류 없음</div>
                    <div class="text-muted" th:text="${org.recentErrorAt != null ? #temporals.format(org.recentErrorAt, 'MM-dd HH:mm') : '-'}"></div>
                    <div class="mt-1">
                        <span class="badge bg-danger" th:if="${org.risk}">주의 필요</span>
                        <span class="badge bg-secondary" th:if="${!org.risk}">정상</span>
                    </div>
                </td>
                <td><a th:href="@{/super-admin/organizations/{id}(id=${org.organizationId})}" class="btn btn-outline-secondary btn-sm">관리</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(dashboard.organizationSummaries)}">
                <td colspan="11" class="text-center text-muted py-4">등록된 기관이 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</th:block>
<th:block th:fragment="scripts"></th:block>
</body>
</html>
