<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:attr="data-collapsed=${sidebarCollapsed ? 'true' : 'false'}"
  th:styleappend="|--nav-w:${sidebarCollapsed ? '70px' : '240px'}|">

<head>
  <meta charset="UTF-8">

  <!-- SNS 공유시 썸네일 표시(보통 헤드에 들어감) -->
  <meta property="og:title" content="코어솔루션 인사평가시스템"> <!-- 공유시 사이트 이름 -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hr.sosyge.net/pe/login"> <!-- 공유시 입력될 URL -->
  <meta property="og:image" content="/resources/Sharing/img/core_icon_big.png"> <!-- 공유시 노출 이미지 (최적 사이즈 : 800 x 400) -->
  <meta property="og:description" content="코어솔루션 인사평가시스템"> <!-- 공유시 보여질 사이트 간략 소개 -->
  <title>관리자페이지</title>
  <link rel="stylesheet" th:href="@{/css/css.css}">
  <link rel="stylesheet" th:href="@{/css/alertcss.css}">
  <link rel="stylesheet" th:href="@{/css/demoheadercss.css}">
  <link rel="stylesheet" th:href="@{/css/leftMenu.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
  <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
  <link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">
  <style>
    /* ========== Notice Admin ========== */
    .admin-notice__topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 0;
    }

    .admin-notice__topbar .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .admin-notice .btn {
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }

    .admin-notice .btn.primary {
      background: #0e366c;
      color: #fff;
      border-color: #0e366c;
    }

    .admin-notice .btn.small {
      padding: 6px 10px;
      font-size: 12px;
    }

    .admin-notice .btn.danger {
      background: #e11d48;
      color: #fff;
      border-color: #e11d48;
    }

    .admin-notice__listcard {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 8px;
    }

    .notice-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }

    .notice-table thead th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      z-index: 1;
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      font-weight: 700;
      color: #0f172a;
    }

    .notice-table tbody td {
      padding: 10px;
      border-bottom: 1px solid #f1f5f9;
      color: #111827;
    }

    .notice-table tbody tr:hover {
      background: #f9fafb;
    }

    /* 모달 공통 */
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100000;
    }

    .modal.show {
      display: flex;
    }

    .modal::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .45);
    }

    .modal__dialog {
      position: relative;
      z-index: 1;
      width: min(1100px, 96vw);
      max-height: 92vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 72px rgba(0, 0, 0, .28);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal__head {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal__head h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .modal__close {
      margin-left: auto;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      font-size: 24px;
      cursor: pointer;
    }

    .modal__body {
      padding: 14px 16px;
      overflow: auto;
    }

    .modal__foot {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal .spacer {
      flex: 1;
    }

    #noticeForm label {
      display: block;
      font-size: 12px;
      color: #334155;
      margin-bottom: 8px;
    }

    #noticeForm input[type="text"],
    #noticeForm input[type="number"],
    #noticeForm input[type="datetime-local"],
    #noticeForm textarea {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      color: #111827;
      background: #fff;
    }

    #noticeForm .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 8px;
    }

    #noticeForm .grid .col {
      min-width: 0;
    }

    #noticeForm .grid .chk {
      display: flex;
      align-items: end;
    }

    #noticeForm .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    #noticeForm .editor__toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    /* 미리보기 메모룩 (로그인 모달과 동일 톤) */
    .memo {
      position: relative;
      padding: 26px 16px 18px;
      isolation: isolate;
    }

    .memo__tape {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 20px;
      border-radius: 4px;
      background: linear-gradient(180deg, #b7d2ee, #9fc2e6);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
      opacity: .95;
    }

    .memo__head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 0 6px;
    }

    .memo__head .badge {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: #0e366c;
      box-shadow: 0 0 0 2px #e8eef7;
    }

    .memo__title {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      color: #0e366c;
    }

    .memo__paper {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, .06);
      padding: 14px 14px;
    }

    .memo__body {
      color: #101828;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ul.cols 렌더 */
    .memo__body ul {
      list-style: none;
      padding: 0;
      margin: 10px 0 0;
    }

    .memo__body ul>li {
      position: relative;
      padding-left: 14px;
      margin: 6px 0;
    }

    .memo__body ul>li::before {
      content: "";
      position: absolute;
      left: 0;
      top: .7em;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #113c74;
    }

    .memo__body ul.cols>li {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
    }

    .memo__body ul.cols>li>span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .memo__body ul.cols>li>em {
      font-style: normal;
      color: #475467;
      font-size: 13px;
      white-space: nowrap;
    }

    .memo__body ul.cols>li:has(> span:empty)::before {
      display: none;
    }

    @media (max-width: 980px) {
      #noticeForm .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      #noticeForm .split {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div th:replace="~{Include/layout :: header}"></div>
  <div th:replace="~{Include/layout :: nav_section}"></div>
  <div class="main-content">
    <div class="admin-notice">
      <div class="admin-notice__topbar">
        <div class="filters">
          <label>연도
            <input type="number" id="f-year" min="0" value="0" title="0이면 전체" />
          </label>
          <label><input type="checkbox" id="f-active" checked /> 활성</label>
          <label><input type="checkbox" id="f-pinned" /> 고정만</label>
          <button class="btn" id="btn-refresh">새로고침</button>
        </div>
        <div class="actions">
          <button class="btn primary" id="btn-new">+ 신규 공지</button>
        </div>
      </div>

      <div class="admin-notice__listcard">
        <table class="notice-table" id="noticeTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>연도</th>
              <th>제목</th>
              <th>버전</th>
              <th>고정</th>
              <th>정렬</th>
              <th>게시기간</th>
              <th>활성</th>
              <th style="width:190px;">작업</th>
            </tr>
          </thead>
          <tbody><!-- JS 렌더 --></tbody>
        </table>
      </div>
    </div>

    <!-- 편집 모달 -->
    <div class="modal notice-edit-modal" id="noticeEditModal" style="display:none;">
      <div class="modal__dialog">
        <div class="modal__head">
          <h3 id="editorTitle">공지 작성</h3>
          <button class="modal__close" data-close="1">×</button>
        </div>
        <div class="modal__body">
          <form id="noticeForm" autocomplete="off">
            <input type="hidden" name="id" />

            <div class="grid">
              <div class="col">
                <label>평가연도
                  <input type="number" name="evalYear" value="0" min="0" />
                </label>
              </div>
              <div class="col">
                <label>버전 태그
                  <input type="text" name="versionTag" placeholder="예: v2025-11" />
                </label>
              </div>
              <div class="col">
                <label>정렬순서
                  <input type="number" name="sortOrder" value="10" />
                </label>
              </div>
              <div class="col chk">
                <label><input type="checkbox" name="pinned" checked /> 상단 고정</label>
              </div>
              <div class="col chk">
                <label><input type="checkbox" name="isActive" checked /> 활성화</label>
              </div>
            </div>

            <div class="grid">
              <div class="col">
                <label>게시 시작
                  <input type="datetime-local" name="publishFrom" />
                </label>
              </div>
              <div class="col">
                <label>게시 종료
                  <input type="datetime-local" name="publishTo" />
                </label>
              </div>
            </div>

            <label>제목
              <input type="text" name="title" placeholder="상단 굵은 문구" />
            </label>

            <div class="split">
              <div class="editor">
                <div class="editor__toolbar">
                  <span>본문(HTML 허용)</span>
                  <div class="spacer"></div>
                  <button type="button" class="btn small" id="btn-insert-template">리스트 템플릿</button>
                </div>
                <textarea name="bodyMd" id="bodyMd" rows="16" placeholder='예) <ul class="cols"> ... '></textarea>
              </div>
              <div class="preview">
                <div class="memo">
                  <div class="memo__tape"></div>
                  <header class="memo__head">
                    <span class="badge"></span>
                    <h4 class="memo__title" id="pvTitle">Notice</h4>
                  </header>
                  <div class="memo__paper">
                    <div class="memo__body" id="pvBody">(미리보기)</div>
                  </div>
                </div>
              </div>
            </div>

            <div class="modal__foot">
              <button type="button" class="btn" data-close="1">취소</button>
              <div class="spacer"></div>
              <button type="button" class="btn danger" id="btn-delete" style="display:none;">삭제</button>
              <button type="submit" class="btn primary" id="btn-save">저장</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <div th:replace="~{Include/layout :: scripts}"></div>
  <script th:src="@{/js/admin/notice.js}"></script>

  <!-- 스피너 오버레이 -->
  <div id="spinner-overlay" style="display:none;">
    <div class="spinner-container">
      <div class="spinner"></div>
      <p>잠시만 기다려주세요</p>
    </div>
  </div>
</body>

</html>
