<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="data-collapsed=${sidebarCollapsed ? 'true' : 'false'}"
      th:styleappend="|--nav-w:${sidebarCollapsed ? '70px' : '240px'}|">
<head>
  <meta charset="UTF-8">
  <meta property="og:title" content="코어솔루션 인사평가시스템">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hr.sosyge.net/pe/login">
  <meta property="og:image" content="/resources/Sharing/img/core_icon_big.png">
  <meta property="og:description" content="코어솔루션 인사평가시스템">
  <title>관리자페이지</title>

  <link rel="stylesheet" th:href="@{/css/css.css}">
  <link rel="stylesheet" th:href="@{/css/alertcss.css}">
  <link rel="stylesheet" th:href="@{/css/demoheadercss.css}">
  <link rel="stylesheet" th:href="@{/css/leftMenu.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
  <link rel="stylesheet" th:href="@{/css/select2.css}">
  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
	<link rel="stylesheet" th:href="@{/css/Include/spinner.css}" />
  <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
  <link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">

  <style>
    .main-inner   { max-width: 1100px; }

    /* ===== 카드 ===== */
    .card {
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
    }
    .card h2 { margin: 0 0 14px; font-size: 20px; color:#2a384a; }
    .muted { color:#666; font-size:13px; }

    /* 폼 구성 */
    .form-grid > div { margin-bottom: 16px; }
    label { display:block; font-weight:600; margin-bottom:6px; color:#333; }
    select, input[type=text], textarea {
      width: 100%; height: 42px; border:1px solid #d0d7de; border-radius:6px; padding:8px 10px;
      box-sizing: border-box; font-size:14px; color:#333;
    }
    textarea { height: 90px; resize: vertical; }

    /* 버튼 */
    .btn { display:inline-block; border:none; border-radius:3px; cursor:pointer; padding:10px 16px; font-size:14px; transition:.2s; }
    .btn:hover { opacity:.92; }
    .btn-primary { background:#1b304a; color:#fff; }
    .btn-orange  { background:#f89d00; color:#fff; }

    /* Select2 일관 스타일 */
    .select2-container .select2-selection--single { height:42px !important; border:1px solid #d0d7de !important; border-radius:6px !important; display:flex !important; align-items:center !important; }
    .select2-selection__rendered { line-height:42px !important; font-size:14px; color:#333 !important; }
    .select2-selection__arrow { height:42px !important; }

    /* 카드 등장 애니메이션 (선택) */
    @keyframes card-rise { from {opacity:0; transform: translateY(14px);} to {opacity:1; transform: none;} }
    .card { opacity:0; transform: translateY(14px); }
    .page-ready .card { animation: card-rise .32s ease-out both; }
    .page-ready .card:nth-of-type(2){ animation-delay:.05s; }
    .page-ready .card:nth-of-type(3){ animation-delay:.10s; }

    @media (prefers-reduced-motion: reduce) {
      .card, .page-ready .card { animation:none !important; opacity:1; transform:none; }
    }
  </style>
</head>
<body>
  <div th:replace="~{Include/layout :: header}"></div>
  <div th:replace="~{Include/layout :: nav_section}"></div>

  <div class="main-content">
    <div class="main-inner">

      <!-- 메시지 카드 -->
      <div class="card" th:if="${msg} or ${err}">
        <div th:if="${msg}" class="msg ok" th:text="${msg}" style="background:#e8f5e9;border:1px solid #a5d6a7;color:#1b5e20;padding:12px 16px;border-radius:6px;margin-bottom:10px;"></div>
        <div th:if="${err}" class="msg err" th:text="${err}" style="background:#ffebee;border:1px solid #ef9a9a;color:#b71c1c;padding:12px 16px;border-radius:6px;"></div>
      </div>

      <!-- 폼 카드 -->
      <div class="card">
        <h2>커스텀 평가 대상 추가</h2>
        <p class="muted">평가자와 평가 대상자를 검색해 선택한 뒤 필요한 정보를 입력하세요.</p>

        <form th:action="@{/admin/targets/custom}" method="post" class="form-grid">
          <input type="hidden" name="year" th:value="${year}" />

          <div>
            <label for="evaluator">평가자</label>
            <select name="userId" id="evaluator" class="js-person-select" data-placeholder="평가자 검색" required>
              <option th:if="${evaluatorId == null}" value=""></option>
              <th:block th:each="dept : ${departments}">
                <optgroup th:label="|${dept.subName} (${dept.subCode})|">
                  <option th:each="u : ${dept.users}"
                          th:value="${u.id}"
                          th:text="|${u.name} (${u.id})|"
                          th:selected="${evaluatorId != null and evaluatorId == u.id}">
                  </option>
                </optgroup>
              </th:block>
            </select>
          </div>

          <div>
            <label for="target">평가 대상자</label>
            <select name="targetId" id="target" class="js-person-select" data-placeholder="대상자 검색" required>
              <option value=""></option>
              <th:block th:each="dept : ${departments}">
                <optgroup th:label="|${dept.subName} (${dept.subCode})|">
                  <option th:each="u : ${dept.users}"
                          th:value="${u.id}"
                          th:text="|${u.name} (${u.id})|">
                  </option>
                </optgroup>
              </th:block>
            </select>
          </div>

          <div>
            <label>평가 이벤트</label>
            <select name="dataEv" required>
              <option value="">-- 선택 --</option>
              <option th:each="e : ${dataEvs}" th:value="${e.key}" th:text="${e.value}"></option>
            </select>
          </div>

          <div>
            <label>문항 갯수 설정</label>
            <select name="dataType" required>
              <option value="">-- 선택 --</option>
              <option th:each="tc : ${dataTypes}" th:value="${tc.key}" th:text="${tc.value}"></option>
            </select>
          </div>

          <div>
            <label>평가 그룹(유형)</label>
            <select name="evalTypeCode" required>
              <option value="">-- 선택 --</option>
              <option th:each="tc : ${typeCodes}" th:value="${tc.key}" th:text="${tc.value}"></option>
            </select>
          </div>

          <div>
            <label>사유(선택)</label>
            <input type="text" name="reason" maxlength="200"/>
          </div>

          <div>
            <button class="btn btn-orange" type="submit">저장</button>
          </div>

          <!-- 텍스트 메시지 영역(선택) -->
          <p th:if="${message}" th:text="${message}" style="color:green;"></p>
          <p th:if="${error}"   th:text="${error}"   style="color:red;"></p>
        </form>
      </div>

    </div>
  </div>

  <!-- 스피너 오버레이 -->
<div id="spinner-overlay" style="display:none;">
  <div class="spinner-container">
    <div class="spinner"></div>
    <p>잠시만 기다려주세요</p>
  </div>
</div>
  <!-- 스크립트 -->
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

  <script th:src="@{/js/admin/admin.js}"></script>
  <script th:replace="~{Include/layout :: scripts}"></script>

  <script>
    // 카드 등장 애니메이션 트리거
    window.addEventListener('DOMContentLoaded', function(){
      document.body.classList.add('page-ready');
    });

    // Select2 초기화
    $(function () {
      $('.js-person-select').each(function () {
        const $el = $(this);
        $el.select2({
          placeholder: $el.data('placeholder') || '검색',
          allowClear: true,
          width: '100%',
          dropdownAutoWidth: true,
          language: { noResults: () => '검색 결과 없음' },
          minimumInputLength: 0
        });
      });
    });
  </script>
</body>
</html>
