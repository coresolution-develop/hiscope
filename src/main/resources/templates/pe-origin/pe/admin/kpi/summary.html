/* ===== 프린트 Fallback (Ctrl+P 등 직접인쇄 대비) ===== */
@media print {
  html, body, main, .main, .main-content {
    margin: 0 !important; padding: 0 !important;
    width: 100% !important; max-width: none !important;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  #print-area {
    position: static !important;
    left:auto !important; top:auto !important; right:auto !important; bottom:auto !important;
    margin:0 !important; width:100% !important; max-width:none !important;
    padding:0 !important; box-sizing:border-box !important; transform:none !important;
    overflow: visible !important;
    background: #fff;
  }
  table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; break-inside: auto; }
  thead { display: table-header-group; }
  tfoot { display: table-footer-group; }
  tr, th, td { page-break-inside: avoid; break-inside: avoid; }
  .tbl th, .tbl td { padding: 8px 10px !important; font-size: 12px; }
  .print-title { margin: 0 0 6mm 0 !important; font-size: 20px !important; font-weight: 800; text-align: left; break-after: avoid-page; }
  #print-area * { animation: none !important; transition: none !important; transform: none !important; }
  #print-area::before, #print-area::after{ content:""; display:block; height:0.1px; }
  #print-header {
    display: block !important;
    margin-bottom: 6mm !important;
    font-size: 24px !important;
    text-align: left;
  }
}

.tbl thead th{

  top: var(--sticky-offset, 72px);   /* JS가 폼 높이까지 보정 */

              0 -1px 0 rgba(0,0,0,.06) inset;
}

<!-- 숫자 공통 출력: null -> '-', 정수면 소수점 없음, 소수면 최대 둘째 자리 -->
<th:block th:fragment="fmt(v)">
  <!-- 값이 있을 때: 숫자만 출력 (인쇄에도 출력됨) -->
  <span class="nowrap only-in-td"
        th:if="${ (v != null and !(v instanceof T(java.lang.String))) 
                 or (v instanceof T(java.lang.String) and !#strings.isEmpty(#strings.trim(v))) }"
        th:with="
          n=${ (v instanceof T(java.lang.String))
                ? T(java.lang.Double).parseDouble(#strings.replace(#strings.trim(v),',',''))
                : v },
          s=${ #numbers.formatDecimal(n, 1, 2) }"
        th:text="${ #strings.endsWith(s,'.00') 
                    ? s.substring(0, s.length()-3) 
                    : (#strings.endsWith(s,'0') 
                          ? s.substring(0, s.length()-1) 
                          : s) }">
  </span>

  <!-- 값이 없을 때: 화면에서는 자리만 유지(보이진 않음), 인쇄에서는 완전 숨김 -->
  <span class="nowrap only-in-td no-print placeholder"
        th:if="${ v == null or (v instanceof T(java.lang.String) and #strings.isEmpty(#strings.trim(v))) }">-</span>
</th:block>

  <script>
  // ===== 주입/제거 유틸 =====
  let __printStyleEl = null;
  let mqListener = null;

  function injectPrintStyle(css) {
    removePrintStyle();
    __printStyleEl = document.createElement('style');
    __printStyleEl.setAttribute('data-print-style', 'kpi-summary');
    __printStyleEl.type = 'text/css';
    __printStyleEl.appendChild(document.createTextNode(css));
    document.head.appendChild(__printStyleEl);
  }

  function removePrintStyle() {
    if (mqListener && window.matchMedia) {
      try { window.matchMedia('print').removeEventListener('change', mqListener); } catch(e){}
      mqListener = null;
    }
    if (__printStyleEl && __printStyleEl.parentNode) {
      __printStyleEl.parentNode.removeChild(__printStyleEl);
      __printStyleEl = null;
    }
  }

  /**
   * size: 'A4P'|'A4L'|'A3P'|'A3L'
   * scale: 글자 크기 미세 조정(기본 1)
   */
  window.printAs = function (size = 'A4L', scale = 1) {
    // 1) 기존 것 제거
    removePrintStyle();

    // 2) 규칙 생성
    let pageDecl = 'A4 landscape', base = 11, margin = '8mm';
    switch (size) {
      case 'A4P': pageDecl = 'A4 portrait';  base = 11;   margin = '10mm'; break;
      case 'A4L': pageDecl = 'A4 landscape'; base = 10.5; margin = '8mm';  break;
      case 'A3P': pageDecl = 'A3 portrait';  base = 11;   margin = '10mm'; break;
      case 'A3L': pageDecl = 'A3 landscape'; base = 10;   margin = '8mm';  break;
    }
    base = Math.max(9.5, base * (scale || 1));

    const css = `
      @page{ size:${pageDecl}; margin:${margin} !important; }
      @media print{
        html,body{
          margin:0 !important; padding:0 !important; height:auto !important;
          font-size:${base}px; line-height:1.35;
          -webkit-print-color-adjust:exact; print-color-adjust:exact;
        }
        /* ===== 화면 UI 숨김(필요 시 사이트 공통 네비 등 추가) ===== */
        header, nav, aside,
        .toolbar, .no-print, .wrapper,
        #admin-nav, #user-nav, .nav_section,
        .leftMenu, .lnb,
        [role="navigation"], [data-role="sidebar"],
        .demoheader, .layout-header, .top_wrap, .gnb {
          display: none !important;
        }

        /* 인쇄영역 강제 리셋 */
        #print-area{
          position:static !important; margin:0 !important; padding:0 !important;
          width:100% !important; max-width:none !important; overflow:visible !important;
        }

        /* 표/줄바꿈 제어 */
        thead{ display:table-header-group }
        tfoot{ display:table-footer-group }
        table{ width:100% !important; border-collapse:collapse !important; page-break-inside:auto }
        tr{ page-break-inside:auto; break-inside:auto }
        th,td{ page-break-inside:avoid; break-inside:avoid; padding:4px 6px !important }

        /* 제목(있다면) */
        .print-title{
          break-after:avoid-page; margin:0 0 6mm 0 !important;
          font-size:${Math.round(base*1.8)}px !important; font-weight:800
        }

        /* 모션 제거 */
        #print-area *{ animation:none !important; transition:none !important; transform:none !important }
        /* 크롬 첫/마지막 페이지 클리핑 방지 */
        #print-area::before, #print-area::after{ content:""; display:block; height:0.1px; }
      }`;

    // 3) 규칙 주입
    injectPrintStyle(css);

    // 4) 인쇄 후 자동 정리
    const cleanup = () => setTimeout(removePrintStyle, 50);
    if (window.matchMedia) {
      const mq = window.matchMedia('print');
      mqListener = (e) => { if (!e.matches) cleanup(); };
      mq.addEventListener?.('change', mqListener);
    }
    const prev = window.onafterprint;
    window.onafterprint = () => { prev && prev(); cleanup(); };

    // 5) 적용 후 프린트
    setTimeout(() => window.print(), 0);
  };

(function(){
  const root = document.documentElement;
  const sticky = document.querySelector('.filter-sticky');
  const BASE = 72;  // 62(header) + 10(padding)

  function updateStickyOffset(){
    const h = sticky ? Math.ceil(sticky.getBoundingClientRect().height) : 0;
    // thead는 헤더+패딩+폼 높이만큼 내려간 지점에 달라붙어야 겹치지 않음
    root.style.setProperty('--sticky-offset', `${BASE + h - 1}px`);
  }

  window.addEventListener('load', updateStickyOffset);
  window.addEventListener('resize', updateStickyOffset);
  document.addEventListener('change', (e)=>{
    if (sticky && sticky.contains(e.target)) updateStickyOffset();
  });

  // 글꼴/이미지 로딩 지연 대응
  setTimeout(updateStickyOffset, 0);
  setTimeout(updateStickyOffset, 300);
})();
function getCurrentFilter() {
    const yearEl = document.getElementById('yearSelect');
    const orgEl  = document.querySelector('select[name="orgName"]');

    return {
      year: yearEl ? yearEl.value : '',
      orgName: orgEl ? orgEl.value : ''
    };
  }

  // 직원 KPI 결과(총점 + 다면점수) kpi_eval_result로 일괄 저장
  function saveStaffKpiResults2025(mode) {
    const filter = getCurrentFilter();
    if (!filter.year) { alert('연도를 선택해 주세요.'); return; }

    const label = (mode === 'NEW') ? '20/15/15/50' : '10/10/10/70';
    if (!confirm(`${filter.year}년 ${(filter.orgName || '전체 기관')} 직원 점수를 ${label} 기준으로 저장하시겠습니까?`)) {
      return;
    }

    OnlyshowSpinner?.();

    $.ajax({
      url: '/admin/kpi/staff/save',
      method: 'POST',
      data: { year: filter.year, orgName: filter.orgName || '', mode: mode }
    }).done(function(res){
      alert(res?.message || '저장이 완료되었습니다.');
      $('#search-btn').click();
    }).fail(function(xhr){
      console.error(xhr);
      alert('저장 중 오류가 발생했습니다.');
    }).always(function(){
      OnlyhideSpinner?.();
    });
  }

  // kpi_eval_result 기준으로 직원 등급 산출
  function applyStaffGrades2025(mode) {
    const filter = getCurrentFilter();
    if (!filter.year) {
      alert('연도를 선택해 주세요.');
      return;
    }
    if (!confirm(filter.year + '년 ' + (filter.orgName || '전체 기관')
                 + ' 직원 등급을 산출하시겠습니까?\n'
                 + '기존 등급/백분위가 있으면 덮어쓰게 됩니다.')) {
      return;
    }

    console.log('직원 등급 산출 호출', filter);
    if (typeof OnlyshowSpinner === 'function') {
      OnlyshowSpinner();
    }

    $.ajax({
      url: '/admin/kpi/staff/grade',
      method: 'POST',
      data: {
        year: filter.year,
        orgName: filter.orgName || ''
      }
    }).done(function(res) {
      const msg = (res && res.message)
        ? res.message
        : '직원 등급 산출이 완료되었습니다.';
      alert(msg);
      // 등급까지 화면에 보여주고 싶으면 재조회
      $('#search-btn').click();
    }).fail(function(xhr) {
      console.error('applyStaffGrades2025 오류', xhr);
      alert('직원 등급 산출 중 오류가 발생했습니다.');
    }).always(function() {
      if (typeof OnlyhideSpinner === 'function') {
        OnlyhideSpinner();
      }
    });
  }
$('#search-btn').click(function(){
  console.log('검색 버튼 클릭 - 스피너 표시');
  OnlyshowSpinner();
});
