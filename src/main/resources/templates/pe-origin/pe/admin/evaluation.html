:root {
  --nav-w: 240px;
  --header-h: 62px;
  --container-max: 1100px;
}

/* 본문 베이스 */
.main-content {
  margin-left: var(--nav-w);
  background: #f7f7f7;
  min-height: 100vh;
  padding: 0 0 30px 0;
}
.main-inner {
  max-width: var(--container-max);
    margin: 0 auto;
    padding: 20px;
}

/* 카드 섹션 */
.card {
  background: #fff;
  border: 1px solid #e9ecef;
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.card h2 { margin: 0 0 12px; font-size: 20px; color:#2a384a; }

/* 설명 단락 간격 */
.scroll-container p { 
    color: #444;
    margin: 4px 0;
    line-height: 1.5; }

/* 업로드/버튼 레이아웃 */
.eval-form {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: max-content;
  gap: 12px 16px;
  align-items: center;
  justify-content: start;
  flex-wrap: nowrap;
}
.eval-form form { display: flex; gap: 8px; align-items: center; }

/* 업로드 폼 내부 요소 정렬 */
.upload-form .btn-file { margin-right: 8px; }
.file-name { color:#666; font-size: 13px; }

/* 버튼 톤(기존 클래스 재사용) */
.orange-btn, .white-btn, .btn.orange-btn {
  border-radius: 3px;
  padding: 9px 14px;
  height: 38px;
  line-height: 20px;
}
.orange-btn, .btn.orange-btn {
  background:#f89d00; border:1px solid #f89d00; color:#fff; cursor:pointer;
}
.white-btn:hover { background:#f8f9fa; }
.orange-btn:hover { filter: brightness(.96); }

/* 표 스타일 */
.table-wrap { overflow:auto; }
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.data-table th, .data-table td {
  border: 1px solid #d7d7d7;
  padding: 8px 12px;
  text-align: left; /* 가독성 */
  font-size: 13px;
}
.data-table thead th {
	text-align: center;
  background: #f3f5f8;
  font-weight: 600;
  position: sticky;
  top: 0;              /* 스크롤해도 헤더 고정 */
  z-index: 1;
}

/* 긴 문제 텍스트 말줄임 */
.truncate {
  max-width: 0;             /* 테이블 레이아웃 안에서 효과 */
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* 반응형: 좁아지면 폼 세로 스택 */
@media (max-width: 1200px) {
  .eval-form {
    grid-auto-flow: row;
    grid-template-columns: 1fr;
    justify-items: start;
  }
  .eval-form form { width: 100%; }
}
/* 테이블 박스 자체를 둥글게 */
.table-wrap{
  border:1px solid #e2e8f0;      /* 바깥 테두리 */
  border-radius:10px;            /* 원하는 반경 */
  overflow:hidden;               /* 둥근 모서리 클리핑 */
}

/* 테이블은 분리 모드 + 간격 0 */
.data-table{
  border-collapse:separate;
  border-spacing:0;
}

/* 셀 바깥 테두리는 제거하고, 행 구분선만 */
.data-table th,
.data-table td{
  border:0;                      /* 기존 1px 보더 제거 */
  padding:8px 12px;
}

/* 헤더/바디 구분선 */
.data-table thead th{
  background:#f3f5f8;
  font-weight:600;
  position:sticky; top:0; z-index:1;
  border-bottom:1px solid #e5e7eb;
}

/* 행 구분선(원하면 색상 조정) */
.data-table tbody td{
  border-top:1px solid #f0f2f5;
  text-align: center;
}
.data-table tbody td:first-child{
	text-align: left;
}
/* 접근성용 숨김 */
.visually-hidden{
  position:absolute !important; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}

/* 카드 헤더 레이아웃 */
.card-head{
  display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px;
}
.card-head h2{ margin:0; font-size:20px; color:#2a384a; }

/* ? 버튼 */
.help-btn{
  width:28px; height:28px; border-radius:50%;
  border:1px solid #d0d7de; background:#fff; color:#1b304a; font-weight:700;
  display:inline-flex; align-items:center; justify-content:center; cursor:pointer;
}
.help-btn:hover{ background:#f8f9fa; }

/* 도움말 다이얼로그 */
.help-dialog[hidden]{ display:none; }
.help-dialog{
  position:fixed; inset:0; z-index:1000; display:flex; align-items:center; justify-content:center;
}
.help-dialog__backdrop{
  position:absolute; inset:0; background:rgba(0,0,0,.35);
}
.help-dialog__panel{
  position:relative; width:min(640px, 92vw); background:#fff; border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.25); border:1px solid #e5e7eb;
  overflow:hidden; animation:help-pop .16s ease-out;
}
@keyframes help-pop{ from{ transform:translateY(6px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
.help-dialog__header{
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  padding:14px 16px; border-bottom:1px solid #eef1f5;
}
.help-dialog__header h3{ margin:0; font-size:16px; color:#2a384a; }
.help-dialog__close{
  border:0; background:transparent; font-size:24px; line-height:1; cursor:pointer; color:#667085;
}
.help-dialog__close:hover{ color:#344054; }
.help-dialog__body{
  padding:16px; color:#444; font-size:14px; line-height:1.55;
}
.help-dialog__body p{ margin:6px 0; }

/* 카드 등장 애니메이션 */
@keyframes card-rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 초기 상태: 보이지 않게 */
.card {
  opacity: 0;
  transform: translateY(14px);
}

/* 페이지 준비되면 실행 */
.page-ready .card {
  animation: card-rise .32s ease-out both;
}

/* 여러 카드가 있으면 살짝씩 지연 (스태거) */
.page-ready .card:nth-of-type(2) { animation-delay: .05s; }
.page-ready .card:nth-of-type(3) { animation-delay: .10s; }
.page-ready .card:nth-of-type(4) { animation-delay: .15s; }

/* 모션 최소화 환경에선 애니메이션 비활성화 */
@media (prefers-reduced-motion: reduce) {
  .card, .page-ready .card { animation: none !important; opacity: 1; transform: none; }
}
/* main-content 영역만 디밍할 수 있게 레이어 기준점 부여 */
.main-content { position: relative; }

/* 본문만 어둡게 (사이드바/헤더는 그대로) */
.main-content.is-dimmed::after{
  content:"";
  position:absolute; inset:0;
  background: rgba(0,0,0,.35);
  z-index: 900;            /* 패널보다 한 단계 낮게 */
}

/* 백드롭은 이제 쓰지 않으므로 숨김(있어도 무방) */
.help-dialog__backdrop{ display:none !important; }

/* 패널는 그대로, 필요시 살짝 여백 */
.help-dialog__panel{
  position:relative;
  width:min(640px, 92%);
  margin: 0 auto;
}

/* 모바일에서 패널 폭 최적화 */
@media (max-width: 640px){
  .help-dialog__panel{ width: 96%; }
}
/* ✅ 다이얼로그를 컨텐츠 영역(헤더/사이드바 제외)에 고정하고 중앙 정렬 */
:root{
  --nav-w: 240px;   /* 이미 선언되어 있으면 생략 가능 */
  --header-h: 62px; /* 이미 선언되어 있으면 생략 가능 */
}
.help-dialog{
  position: fixed;                  /* absolute → fixed */
  top: var(--header-h);             /* 헤더 높이만큼 아래에서 시작 */
  left: var(--nav-w);               /* 사이드바 오른쪽에서 시작 */
  right: 0;
  bottom: 0;                        /* 컨텐츠 영역 전체를 덮는 캔버스 */
  display:flex; align-items:center; justify-content:center;
  z-index: 1001;                    /* 디밍 위 */
  pointer-events: none;             /* 빈 영역 클릭 통과 */
}
.help-dialog__panel{
  pointer-events: auto;             /* 패널 내부만 클릭 활성화 */
  width: min(640px, 92%);
  background:#fff; border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  border:1px solid #e5e7eb;
  overflow:hidden;
}
/* 본문만 디밍 */
.main-content { position: relative; }
.main-content.is-dimmed::after{
  content:""; position:absolute; inset:0;
  background: rgba(0,0,0,.35);
  z-index: 900;
}

/* 컨텐츠 영역 기준 중앙 고정 */
:root{ --nav-w:240px; --header-h:62px; }
.help-dialog{
  position: fixed;
  top: var(--header-h);
  left: var(--nav-w);
  right: 0;
  bottom: 0;
  display:flex; align-items:center; justify-content:center;
  z-index: 1001;
  pointer-events: none;              /* 빈 영역 클릭 무시 */
}
.help-dialog__panel{
  pointer-events: auto;              /* 패널만 상호작용 */
  width: min(640px, 92%);
  background:#fff; border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  border:1px solid #e5e7eb; overflow:hidden;
}
.help-dialog__backdrop{ display:none !important; }
    </style>

    <div class="main-content">
    <!-- ✅ 가운데 정렬·최대폭 -->
    <div class="main-inner">

      <div class="card">
  <!-- 카드 헤더 + ? 버튼 -->
  <div class="card-head">
    <h2>문제은행 엑셀 업로드</h2>
    <button type="button" class="help-btn"
            aria-label="업로드 안내 보기"
            aria-haspopup="dialog"
            aria-controls="eval-help-dialog">?</button>
  </div>

  <!-- 숨김 도움말 원본(렌더 슬롯) -->
  <div id="eval-help-content" class="visually-hidden">
    <p>1. 엑셀 템플릿을 다운로드 받아서 작성 후 업로드 해주세요.</p>
    <p>2. 엑셀 파일의 첫번째 시트만 인식합니다.</p>
    <p>3. 엑셀 파일의 B3열 부터 인식합니다.</p>
    <p>4. 엑셀 파일의 양식이 맞지 않으면 업로드가 실패할 수 있습니다.</p>
    <p>5. 업로드된 데이터는 아래에서 확인할 수 있습니다.</p>
    <p>6. 업로드된 데이터를 초기화하려면 '데이터 초기화' 버튼을 눌러주세요. (복구 불가)</p>
  </div>

  <!-- 도움말 다이얼로그 -->
  <div id="eval-help-dialog" class="help-dialog" role="dialog" aria-modal="true"
       aria-labelledby="eval-help-title" hidden>
    <div class="help-dialog__backdrop"></div>
    <div class="help-dialog__panel" role="document">
      <div class="help-dialog__header">
        <h3 id="eval-help-title">업로드 안내</h3>
        <button type="button" class="help-dialog__close" aria-label="닫기">&times;</button>
      </div>
      <div class="help-dialog__body" id="eval-help-body"></div>
    </div>
  </div>

  <!-- 업로드/버튼 영역 -->
  <div class="eval-form">
    <form th:action="@{/excel/evaltemplate}" method="get">
      <button class="orange-btn" type="submit">템플릿 다운로드</button>
    </form>

    <form th:action="@{/excel/evalupload}" method="post" enctype="multipart/form-data" class="upload-form">
      <input type="hidden" name="year" th:value="${year}" />
      <input class="white-btn sr-only" id="excelFile" type="file" name="file" accept=".xlsx,.xls">
      <label for="excelFile" class="white-btn btn-file">파일 선택</label>
      <span id="excelFileName" class="file-name">선택된 파일 없음</span>
      <button class="white-btn" type="submit" id="submitBtn">엑셀 업로드</button>
    </form>

    <form th:action="@{/excel/evalreset}" method="post"
          onsubmit="return confirm('정말 해당 연도의 문제 데이터를 초기화하시겠습니까?');">
      <input type="hidden" name="year" th:value="${year}" />
      <button type="submit" class="btn orange-btn">문제은행 데이터 초기화</button>
    </form>
  </div>
</div>

	<div th:replace="~{Include/layout :: scripts}"></div>
    <script th:src="@{/js/admin/admin.js}"></script>
<script>
    (function () {
  // 파일명 표시(기존 유지)
  const input = document.getElementById('excelFile');
  const nameSpan = document.getElementById('excelFileName');
  if (input && nameSpan) {
    input.addEventListener('change', () => {
      nameSpan.textContent = (input.files && input.files[0]) ? input.files[0].name : '선택된 파일 없음';
    });
  }

  // ===== 도움말 다이얼로그 =====
  const helpBtn     = document.querySelector('.help-btn');
  const dialog      = document.getElementById('eval-help-dialog');
  const panel       = dialog?.querySelector('.help-dialog__panel');
  const closeBtn    = dialog?.querySelector('.help-dialog__close');
  const bodySlot    = dialog?.querySelector('#eval-help-body');
  const content     = document.getElementById('eval-help-content');
  const mainContent = document.querySelector('.main-content');
  if (!helpBtn || !dialog || !panel || !bodySlot || !content || !mainContent) return;

  function mountToMain(){
    if (dialog.parentElement !== mainContent) mainContent.appendChild(dialog);
  }
  function openDialog(){
    mountToMain();
    bodySlot.innerHTML = content.innerHTML;
    mainContent.classList.add('is-dimmed');
    dialog.hidden = false;
    requestAnimationFrame(()=> closeBtn?.focus());
    document.addEventListener('keydown', onEsc);
  }
  function closeDialog(){
    dialog.hidden = true;
    mainContent.classList.remove('is-dimmed');
    document.removeEventListener('keydown', onEsc);
  }
  function onEsc(e){ if(e.key === 'Escape') closeDialog(); }

  // 클릭 토글만 사용 (호버 로직 제거: 깜빡임 원인 차단)
  helpBtn.addEventListener('click', (e)=>{
    e.preventDefault();
    dialog.hidden ? openDialog() : closeDialog();
  });
  closeBtn.addEventListener('click', closeDialog);

  // 패널 외 클릭시 닫기
  dialog.addEventListener('click', (e)=>{
    if (!panel.contains(e.target)) closeDialog();
  });

  // 카드 애니메이션 표시 트리거
  document.addEventListener('DOMContentLoaded', ()=> document.body.classList.add('page-ready'));
})();
  </script>
</body>
