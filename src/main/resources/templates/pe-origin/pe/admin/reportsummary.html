<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:attr="data-collapsed=${sidebarCollapsed ? 'true' : 'false'}"
      th:styleappend="|--nav-w:${sidebarCollapsed ? '70px' : '240px'}|">

<head>
  <meta charset="UTF-8" />
  <!-- SNS 공유시 썸네일 표시(보통 헤드에 들어감) -->
  <meta property="og:title" content="코어솔루션 인사평가시스템"> <!-- 공유시 사이트 이름 -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hr.sosyge.net/pe/login"> <!-- 공유시 입력될 URL -->
  <meta property="og:image" content="/resources/Sharing/img/core_icon_big.png"> <!-- 공유시 노출 이미지 (최적 사이즈 : 800 x 400) -->
  <meta property="og:description" content="코어솔루션 인사평가시스템"> <!-- 공유시 보여질 사이트 간략 소개 -->
  <title>평가 총괄표</title>
  <link rel="stylesheet" th:href="@{/css/css.css}">
  <link rel="stylesheet" th:href="@{/css/alertcss.css}">
  <link rel="stylesheet" th:href="@{/css/demoheadercss.css}">
  <link rel="stylesheet" th:href="@{/css/leftMenu.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
	<link rel="stylesheet" th:href="@{/css/Include/spinner.css}" />
  <link rel="shortcut icon" th:href="@{/favicon/favicon.ico}">
  <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/favicon.ico}">
  <link rel="icon" sizes="192x192" th:href="@{/favicon/favicon.ico}">
  <style>
    /* ===== 화면 공용 ===== */
.main-content { padding: 10px; }
.tbl{ width:100%; border-collapse:collapse; table-layout:fixed; font-size:13px; }
.tbl th,.tbl td{ border:0.6pt solid #d6d6d6; padding:6px 8px; text-align:center; }
.tbl thead th{ background:#f2f4f7; }
.left{text-align:left;} .muted{color:#6b7280;} .nowrap{white-space:nowrap;}

/* ===== 프린트 Fallback(CTRL+P 등) ===== */
@media print {

  /* ❷ 화면 레이아웃 여백/중앙정렬/고정폭 전부 해제 */
  html, body, main, .main-content {
    margin: 0 !important;
    padding: 0 !important;
    width: 100% !important;
    max-width: none !important;
    -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
  }
/* 3) 제목이 페이지 끝에 걸려 잘리지 않게 */
  .print-title{
    margin: 0 0 6mm 0 !important;
    font-size: 20px !important;
    font-weight: 800;
    break-after: avoid-page;          /* or page-break-after: avoid; */
  }
  /* ❸ 다른 CSS에서 주는 190mm/auto 중앙정렬, 상단 패딩 등을 완전히 무효화 */
  #print-area {
    position: static !important;    /* fixed/absolute 금지 */
    left: auto !important; top: auto !important; right: auto !important; bottom: auto !important;
    margin-left: 0 !important; margin-right: 0 !important;
    margin-top: 0 !important; margin-bottom: 0 !important;
    width: 100% !important; max-width: none !important;
    padding: 0 !important;            /* ← padding 빼고 @page 여백만 사용 */
    box-sizing: border-box !important;
    transform: none !important;
    overflow: visible !important;
  }

  /* 표는 페이지 넘기며 이어지게 */
  table { width: 100% !important; border-collapse: collapse !important; page-break-inside: auto; break-inside: auto; }
  thead { display: table-header-group; }
  tfoot { display: table-footer-group; }
  tr, th, td { page-break-inside: avoid; break-inside: avoid; }

  /* 셀 패딩(필요 시 조절) */
  .tbl th, .tbl td { padding: 4px 6px !important; }

  /* 제목 여백 겹침 방지 + 좌상단 붙임 */
  .print-title { margin: 0 0 6mm 0 !important; font-size: 20px !important; font-weight: 800; text-align: left; }

  /* 모션/변형 제거(분할 깨짐 방지) */
  #print-area * { animation: none !important; transition: none !important; transform: none !important; }
  /* 5) 크롬 첫/마지막 페이지 클리핑 방지용 0.1px 스페이서 */
  #print-area::before,
  #print-area::after{
    content:"";
    display:block;
    height:0.1px;
  }

  #print-header {
    display: block !important;
    margin-bottom: 6mm !important;
    font-size: 24px !important;
    text-align: left;
  }
}

.btn-animated:hover, .orange-btn:hover, .white-btn:hover, .custom:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 18px rgba(0,0,0,.12);
}
/* 레이아웃 기본 배경을 흰색으로(겹침 방지) */
html, body, .main-content { background:#fff; }

/* 헤더(62px) 바로 아래 10px padding을 덮는 흰 커버 */
.sticky-pad-cover{
  position: sticky;
  top: 62px;       /* 헤더 높이 */
  height: 10px;    /* 메인 padding */
  background: #fff;
  z-index: 150;    /* 헤더 아래, 폼 아래 */
}

/* 상단 폼 sticky */
.filter-sticky{
  position: sticky;
  top: 72px;        /* 62(header) + 10(padding) */
  z-index: 200;     /* thead 보다 위 */
  background: #fff;
  padding: 6px 8px;
  margin: 0;        /* 폼 아래 틈 제거 */
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  border-bottom: 1px solid rgba(0,0,0,.06); /* 경계선 */
}

/* thead sticky – 폼 바로 아래에 착 달라붙게 */
.tbl thead th{
  position: sticky;
  top: var(--sticky-offset, 72px);   /* JS가 폼 높이까지 보정 */
  z-index: 180;                      /* 본문 위, 폼 아래 */
  background: #f2f4f7;
  /* 빈틈으로 본문 글자 비치는 것 방지 */
  background-clip: padding-box;
  box-shadow: 0 1px 0 rgba(0,0,0,.06) inset,
              0 -1px 0 rgba(0,0,0,.06) inset;
}

/* 표 자체의 위쪽 경계 가시성 확보(틈 메우기) */
.tbl{
  border-collapse: collapse;
  background:#fff;         /* 행 글자 비치는 것 차단 */
}

/* 프린트에서는 sticky/그림자 제거 */
@media print{
  .sticky-pad-cover{ display:none !important; }
  .filter-sticky{ position: static !important; box-shadow:none !important; border-bottom:none !important; }
  .tbl thead th{ position: static !important; box-shadow:none !important; }
}
  </style>
</head>

<body>
  <div th:replace="~{Include/layout :: header}"></div>
  <div th:replace="~{Include/layout :: nav_section}"></div>

  <main class="main-content">
    <!-- 헤더 62px 바로 아래, 메인 padding(10px)을 가리는 커버 -->
  <div class="sticky-pad-cover" aria-hidden="true"></div>
    <form method="get" th:action="@{/admin/reportsummary}" class="filter filter-sticky">
      <div style="display: flex; gap: 10px; align-items: center; margin: 8px 0 12px;">
        <div class="no-print">
          <select class="custom" name="orgName" style="margin:0; width: 150px;">
            <option th:value="''" th:selected="${selectedOrgName == null or selectedOrgName == ''}">전체</option>
            <option th:each="org : ${orgList}" th:value="${org}" th:text="${org}"
              th:selected="${org == selectedOrgName}">
            </option>
          </select>
        </div>
        <div class="no-print">
          <select class="custom" name="year" id="yearSelect" style="margin:0; width: 85px;">
            <option th:each="y : ${#numbers.sequence(2024, 2025)}" th:value="${y}" th:text="${y}"
              th:selected="${y == selectedYear}">
            </option>
          </select>
        </div>
        <div class="toolbar no-print">
  <button class="white-btn" id="search-btn" type="submit" style="font-size:12px;padding:11px 20px;">조회</button>
</div>
<div class="toolbar no-print" style="display:flex; gap:8px;">
  <button class="orange-btn" type="button" style="font-size:12px;padding:11px 20px;"
          onclick="printAs('A4L')">A4 출력</button>
  <button class="orange-btn" type="button" style="font-size:12px;padding:11px 20px;"
          onclick="printAs('A3L')">A3 출력</button>
</div>
      </div>
    </form>

    <div id="print-area" th:if="${vm != null}">
    <div id="print-header" style="margin:8px 0 12px 0;">
      <span style="font-weight: bold;"
          th:text="${selectedYear + '년 근무평가 총괄표 : '}"></span>
      <span th:text="${selectedOrgName}"></span>
    </div>

      <table class="tbl">
        <thead>
          <tr>
            <th>부서명</th>
            <th>사원번호</th>
            <th>성명</th>
            <th>직책</th>

            <!-- ✅ Map.get으로 직접 접근 -->
            <th th:each="code : ${vm.evOrder}" th:text="${vm.evPath.get(code)}">관계</th>
          </tr>
        </thead>

        <tbody th:if="${vm != null}">
          <tr th:each="r : ${vm.rows}">
            <td th:text="${r.deptName}">부서</td>
            <td th:text="${r.empId}">id</td>
            <td th:text="${r.empName}">성명</td>
            <td th:text="${r.position}">직책</td>

            <td th:each="code : ${vm.evOrder}" th:with="cell=${r.ev.get(code)}">
              <span th:text="${cell != null and cell.score100 != null
  ? #numbers.formatDecimal(cell.score100, 1, 2)
  : '-'}">-</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- 스피너 오버레이 -->
<div id="spinner-overlay" style="display:none;">
  <div class="spinner-container">
    <div class="spinner"></div>
    <p>잠시만 기다려주세요</p>
  </div>
</div>
  <script src="https://code.jquery.com/jquery-latest.min.js"></script>
  <div th:replace="~{Include/layout :: scripts}"></div>
  <script>
(() => {
  const STYLE_ID = 'dynamic-print-size';
  let mqListener = null;

  function removePrintStyle() {
    // matchMedia 리스너 정리
    if (mqListener && window.matchMedia) {
      try { window.matchMedia('print').removeEventListener('change', mqListener); } catch {}
      mqListener = null;
    }
    // 스타일 제거
    const old = document.getElementById(STYLE_ID);
    if (old) old.remove();
    // 리플로우 강제(다음 규칙이 확실히 적용되도록)
    void document.documentElement.offsetHeight;
  }

  function injectPrintStyle(css) {
    const tag = document.createElement('style');
    tag.id = STYLE_ID;
    tag.media = 'print';
    tag.textContent = css;
    document.head.appendChild(tag);
  }

  /**
   * size: 'A4P'|'A4L'|'A3P'|'A3L'
   * scale: 글자 크기 미세 조정(기본 1)
   */
  window.printAs = function (size = 'A4L', scale = 1) {
    // 1) 기존 것 완전 제거
    removePrintStyle();

    // 2) 규칙 생성
    let pageDecl = 'A4 landscape', base = 11, margin = '8mm';
    switch (size) {
      case 'A4P': pageDecl = 'A4 portrait';  base = 11;   margin = '10mm'; break;
      case 'A4L': pageDecl = 'A4 landscape'; base = 10.5; margin = '8mm';  break;
      case 'A3P': pageDecl = 'A3 portrait';  base = 11;   margin = '10mm'; break;
      case 'A3L': pageDecl = 'A3 landscape'; base = 10;   margin = '8mm';  break;
    }
    base = Math.max(9.5, base * (scale || 1));

    const css = `
      @page{ size:${pageDecl}; margin:${margin} !important; }
      @media print{
        html,body{
          margin:0 !important; padding:0 !important; height:auto !important;
          font-size:${base}px; line-height:1.35;
          -webkit-print-color-adjust:exact; print-color-adjust:exact;
        }
          /* ===== 화면 UI 숨김(강제) =====
          필요 시 여기에 사이트의 실제 셀렉터를 더 추가하세요. */
          header, nav, aside,
          .toolbar, .no-print, .wrapper,
          #admin-nav, #user-nav, .nav_section,
          .leftMenu, .lnb,
          [role="navigation"], [data-role="sidebar"],
          .demoheader, .layout-header, .top_wrap, .gnb {
            display: none !important;
          }
        #print-area{
          position:static !important; margin:0 !important; padding:0 !important;
          width:100% !important; max-width:none !important; overflow:visible !important;
        }
        thead{ display:table-header-group }
        tfoot{ display:table-footer-group }
        table{ width:100% !important; border-collapse:collapse !important; page-break-inside:auto }
        tr{ page-break-inside:auto; break-inside:auto }
        th,td{ page-break-inside:avoid; break-inside:avoid; padding:4px 6px !important }
        .print-title{ break-after:avoid-page; margin:0 0 6mm 0 !important; font-size:${Math.round(base*1.8)}px !important; font-weight:800 }
        #print-area *{ animation:none !important; transition:none !important; transform:none !important }
      }`;

    // 3) 새 규칙 주입
    injectPrintStyle(css);

    // 4) 인쇄 후 자동 정리(취소 시도 포함)
    const cleanup = () => setTimeout(removePrintStyle, 50);
    if (window.matchMedia) {
      const mq = window.matchMedia('print');
      mqListener = (e) => { if (!e.matches) cleanup(); };
      mq.addEventListener?.('change', mqListener);
    }
    const prev = window.onafterprint;
    window.onafterprint = () => { prev && prev(); cleanup(); };

    // 5) 아주 짧게 기다렸다가 print (적용 보장)
    setTimeout(() => window.print(), 0);
  };
  
})();

(function(){
  const root = document.documentElement;
  const sticky = document.querySelector('.filter-sticky');
  const BASE = 72;  // 62(header) + 10(padding)

  function updateStickyOffset(){
    const h = sticky ? Math.ceil(sticky.getBoundingClientRect().height) : 0;
    // thead는 헤더+패딩+폼 높이만큼 내려간 지점에 달라붙어야 겹치지 않음
    root.style.setProperty('--sticky-offset', `${BASE + h - 1}px`);
  }

  window.addEventListener('load', updateStickyOffset);
  window.addEventListener('resize', updateStickyOffset);
  document.addEventListener('change', (e)=>{
    if (sticky && sticky.contains(e.target)) updateStickyOffset();
  });

  // 글꼴/이미지 로딩 지연 대응
  setTimeout(updateStickyOffset, 0);
  setTimeout(updateStickyOffset, 300);
})();

$('#search-btn').click(function(){
  console.log('검색 버튼 클릭 - 스피너 표시');
  OnlyshowSpinner();
});
</script>
</body>
