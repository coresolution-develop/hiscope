main {

.scroll-container {

.scrolltable {

.sticky-top {
	position: -webkit-sticky;
    position: sticky;
    top: 72px;
    z-index: 2; /* 높은 z-index 값을 설정 */
}
.sticky-top::before {
	content: "";
	position: absolute;
	top: 1px;
	left: 0;
	width: 100%;
	height: 100%;
	z-index: -1;
	border-bottom: 1px solid #d7d7d7;
    border-right: 1px solid #d7d7d7;
}
.sticky-top:nth-child(1)::before {
	border-right: 1px solid #cccccc;	
}
.sticky-top:nth-child(2)::before {
	border-left: 1px solid #cccccc;	
}
.sticky-middle {
	position: -webkit-sticky;
    position: sticky;
    top: 117px;
    z-index: 2;
}
.sticky-middle::before {
	content: "";
	position: absolute;
	top: -1px;
	left: 0;
	width: 100%;
	height: 100%;
	z-index: -1;
	border-top: 1px solid #d7d7d7;
    border-right: 1px solid #d7d7d7;
}
.sticky-middle:nth-child(4)::before {
	border-right: 1px solid #cccccc;
}
.sticky-bottom {
	position: -webkit-sticky;
    position: sticky;
    top: 162px;
    z-index: 2;

}
.sticky-bottom::before {

	left: 0;

	height: 100%;
	z-index: -1;
	border-top: 2px solid #d7d7d7;
    border-right: 1px solid #d7d7d7;
	border-bottom: 2px solid #cccccc;
}
.sticky-bottom:nth-child(2)::before {
	border-left: 1px solid #cccccc;
}

	-moz-box-shadow: 0 2px 6px rgba(0, 0, 0, 0.19), 0 2px 3px rgba(0, 0, 0, 0.23);
	-ms-box-shadow: 0 2px 6px rgba(0, 0, 0, 0.19), 0 2px 3px rgba(0, 0, 0, 0.23);

:root {
  --nav-w: 240px;
  --header-h: 62px;
  --container-max: 1100px;
}

/* 본문 베이스 */
.main-content {
  margin-left: var(--nav-w);
  background: #f7f7f7;
  min-height: 100vh;
  padding: 0 0 30px 0;
}
.main-inner {
  max-width: var(--container-max);
    margin: 0 auto;
    padding: 20px;
}


/* 카드 섹션 */
.card {
  background: #fff;
  border: 1px solid #e9ecef;
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.card h2 { margin: 0 0 12px; font-size: 20px; color:#2a384a; }
.scroll-container p { color: #444;
    margin: 4px 0;
    line-height: 1.5; }

/* ✅ 업로드/버튼 레이아웃: 기존 .excel-form 덮어쓰기 */
.excel-form {
  display: grid !important;
  grid-auto-flow: column;
  grid-auto-columns: max-content;
  gap: 12px 16px;
  align-items: center;
  justify-content: start;
}
.excel-form form { display: flex; gap: 8px; align-items: center; }

.upload-form .btn-file { margin-right: 8px; }
.file-name { color:#666; font-size: 13px; }

/* 버튼 톤 통일 (기존 클래스 재사용) */
.orange-btn, .white-btn, .btn.orange-btn {
  border-radius: 3px;
  padding: 9px 14px;
  height: 38px;
  line-height: 20px;
}
.orange-btn, .btn.orange-btn {
  background:#f89d00; border:1px solid #f89d00; color:#fff; cursor:pointer;
}
.white-btn:hover { background:#f8f9fa; }
.orange-btn:hover { filter: brightness(.96); }

/* 반응형: 좁아지면 세로 스택 */
@media (max-width: 1200px) {
  .excel-form {
    grid-auto-flow: row;
    grid-template-columns: 1fr;
    justify-items: start;
  }
  .excel-form form { width: 100%; }
}

/* 카드 등장 애니메이션 */
@keyframes card-rise {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 초기 상태: 보이지 않게 */
.card {
  opacity: 0;
  transform: translateY(14px);
}

/* 페이지 준비되면 실행 */
.page-ready .card {
  animation: card-rise .32s ease-out both;
}

/* 여러 카드가 있으면 살짝씩 지연 (스태거) */
.page-ready .card:nth-of-type(2) { animation-delay: .05s; }
.page-ready .card:nth-of-type(3) { animation-delay: .10s; }
.page-ready .card:nth-of-type(4) { animation-delay: .15s; }

/* 모션 최소화 환경에선 애니메이션 비활성화 */
@media (prefers-reduced-motion: reduce) {
  .card, .page-ready .card { animation: none !important; opacity: 1; transform: none; }
}
    </style>
</head>
<body>
    <div th:replace="~{Include/afflayout :: header}"></div>
    <div th:replace="~{Include/afflayout :: nav_section}"></div>
    <div class="main-content">
  <!-- ✅ 가운데 정렬·최대폭 래퍼 -->
  <div class="main-inner">
    <div class="card">
      <div class="scroll-container">
        <h2>직원정보 엑셀 업로드</h2>
        <p style="color:red;">부서 정보를 먼저 업로드 후 직원정보를 업로드 해주세요.</p>
        <p>1. 엑셀 템플릿을 다운로드 받아서 작성 후 업로드 해주세요.</p>
        <p>2. 엑셀 파일의 첫번째 시트만 인식합니다.</p>
        <p>3. 엑셀 파일의 B3열 부터 인식합니다.</p>
        <p>4. 엑셀 파일의 양식이 맞지 않으면 업로드가 실패할 수 있습니다.</p>
        <p>5. 업로드된 데이터는 '직원명부'에서 확인할 수 있습니다.</p>
        <p>6. 업로드된 데이터를 초기화하려면 '데이터 초기화' 버튼을 눌러주세요. (복구 불가)</p>
      </div>

      <!-- ✅ 버튼/업로드 폼: 컴팩트 그리드 -->
      <div class="excel-form">
        <form th:action="@{/aff/excel/downloadTemplate}" method="get">
          <input type="hidden" name="year" th:value="${year}" />
          <button class="orange-btn" type="submit">템플릿 다운로드</button>
        </form>

        <form th:action="@{/aff/excel/upload}" method="post" enctype="multipart/form-data" class="upload-form">
          <input type="hidden" name="year" th:value="${year}" />
          <input class="white-btn sr-only" id="excelFile" type="file" name="file" accept=".xlsx,.xls">
          <label for="excelFile" class="white-btn btn-file">파일 선택</label>
          <span id="excelFileName" class="file-name">선택된 파일 없음</span>
          <button class="white-btn" type="submit" id="submitBtn">엑셀 업로드</button>
        </form>

        <form th:action="@{/aff/excel/reset}" method="post"
              onsubmit="return confirm('정말 업로드된 데이터를 초기화하시겠습니까?');">
          <input type="hidden" name="year" th:value="${year}" />
          <button class="orange-btn btn btn-danger" type="submit">데이터 초기화</button>
        </form>
      </div>
    </div>
  </div>
</div>

        <div id="spinner-overlay" style="display: none;">
            <div class="spinner-container">
                <div class="spinner"></div>
                <p>잠시만 기다려주세요</p>
            </div>
        </div>
    <script src="https://code.jquery.com/jquery-latest.min.js"></script>
	<div th:replace="~{Include/layout :: scripts}"></div>
    <script th:src="@{/js/admin/admin.js}"></script>

    <script th:inline="javascript">
        /*<![CDATA[*/
        function spinner() {
            const overlay = document.getElementById('spinner-overlay');
            if (overlay) {
                overlay.style.display = 'flex';
            }
        }
        $('#submitBtn').on('click', spinner);
        /*]]>*/

		const input = document.getElementById('excelFile');
		const nameSpan = document.getElementById('excelFileName');
		input.addEventListener('change', () => {
			if (!input.files || input.files.length === 0) {
				nameSpan.textContent = '선택된 파일 없음';
				return;
			}
		// 여러 개 허용 시: [...input.files].map(f=>f.name).join(', ')
			nameSpan.textContent = input.files[0].name;
		});

	window.addEventListener('DOMContentLoaded', function () {
    document.body.classList.add('page-ready');
  });
    </script>
</body>
</html>
