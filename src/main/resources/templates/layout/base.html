<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, content, scripts, headExtra)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <th:block th:replace="${pageTitle}"></th:block>
    <th:block th:replace="${headExtra}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@1.0/nanumsquare.css">
    <link rel="stylesheet" th:href="@{/css/hiscope.css}">
</head>
<body>
<th:block th:replace="~{layout/fragments/shell :: topbar}"></th:block>

<div class="container-fluid layout-shell">
    <div class="row g-0">
        <th:block th:replace="~{layout/fragments/shell :: sidebar}"></th:block>

        <main class="col-lg-10 main-content">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${uploadResult}" class="alert alert-dismissible fade show"
                 th:classappend="${uploadResult.status == 'SUCCESS'} ? ' alert-success' : (${uploadResult.status == 'PARTIAL'} ? ' alert-warning' : ' alert-danger')">
                <strong>업로드 결과:</strong>
                전체 <span th:text="${uploadResult.totalRows}">0</span>행 /
                성공 <span th:text="${uploadResult.successRows}">0</span>행 /
                실패 <span th:text="${uploadResult.failRows}">0</span>행
                <div th:if="${uploadResult.hasErrors()}" class="mt-2">
                    <div class="table-responsive">
                        <table class="table table-sm table-bordered mb-0 bg-white">
                            <thead class="table-light"><tr><th>행</th><th>컬럼</th><th>오류 내용</th></tr></thead>
                            <tbody>
                            <tr th:each="err : ${uploadResult.errors}">
                                <td th:text="${err.rowNumber}"></td>
                                <td th:text="${err.column}"></td>
                                <td th:text="${err.message}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <th:block th:replace="${content}"></th:block>
        </main>
    </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script>
    (function () {
        const path = window.location.pathname;
        document.querySelectorAll('[data-nav-prefix]').forEach(link => {
            const prefix = link.getAttribute('data-nav-prefix');
            if (prefix && path.startsWith(prefix)) {
                link.classList.add('active');
            }
        });
    })();

    (function () {
        const STORAGE_KEY = 'sidebarCollapsed';
        const sidebar = document.querySelector('.sidebar');
        const toggleBtn = document.getElementById('sidebarDesktopToggle');
        if (!sidebar || !toggleBtn) return;
        if (localStorage.getItem(STORAGE_KEY) === 'true') {
            sidebar.classList.add('collapsed');
        }
        toggleBtn.addEventListener('click', function () {
            sidebar.classList.toggle('collapsed');
            localStorage.setItem(STORAGE_KEY, sidebar.classList.contains('collapsed'));
        });
    })();
</script>
<th:block th:replace="${scripts}"></th:block>
</body>
</html>
