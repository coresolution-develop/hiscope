<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:fragment="layout(pageTitle, content, scripts, headExtra)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <th:block th:replace="${pageTitle}"></th:block>
    <th:block th:replace="${headExtra}"></th:block>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: calc(100vh - 56px); background: #212529; }
        .sidebar .nav-link { color: #adb5bd; padding: .45rem .9rem; border-radius: .3rem; font-size: .9rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.1); }
        .sidebar .nav-section { color: #6c757d; font-size: .7rem; text-transform: uppercase; padding: .5rem .9rem .15rem; letter-spacing: .06em; }
        .main-content { padding: 1.5rem; }
        .card { border: none; box-shadow: 0 .125rem .25rem rgba(0,0,0,.075); border-radius: .5rem; }
        .table th { background: #f8f9fa; font-weight: 600; font-size: .875rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">
            <i class="bi bi-grid-3x3-gap-fill me-2 text-primary"></i>다면평가 시스템
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-light small">
                <i class="bi bi-person-circle me-1"></i>
                <sec:authentication property="name" />
            </span>
            <a href="/logout" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>로그아웃
            </a>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 sidebar py-2">
            <div sec:authorize="hasRole('SUPER_ADMIN')">
                <div class="nav-section">관리</div>
                <a class="nav-link" href="/super-admin/dashboard"><i class="bi bi-speedometer2 me-2"></i>대시보드</a>
                <a class="nav-link" href="/super-admin/organizations"><i class="bi bi-building me-2"></i>기관 관리</a>
                <a class="nav-link" href="/super-admin/audit"><i class="bi bi-journal-text me-2"></i>감사 로그</a>
            </div>
            <div sec:authorize="hasRole('ORG_ADMIN')">
                <a class="nav-link" href="/admin/dashboard"><i class="bi bi-speedometer2 me-2"></i>대시보드</a>
                <div class="nav-section mt-2">조직</div>
                <a class="nav-link" href="/admin/departments"><i class="bi bi-diagram-3 me-2"></i>부서 관리</a>
                <a class="nav-link" href="/admin/employees"><i class="bi bi-people me-2"></i>직원 관리</a>
                <div class="nav-section mt-2">평가</div>
                <a class="nav-link" href="/admin/evaluation/templates"><i class="bi bi-file-text me-2"></i>평가 템플릿</a>
                <a class="nav-link" href="/admin/evaluation/sessions"><i class="bi bi-calendar3 me-2"></i>평가 세션</a>
                <a class="nav-link" href="/admin/evaluation/results"><i class="bi bi-clipboard-data me-2"></i>평가 결과</a>
                <div class="nav-section mt-2">기타</div>
                <a class="nav-link" href="/admin/uploads/history"><i class="bi bi-upload me-2"></i>업로드 이력</a>
                <a class="nav-link" href="/admin/audit"><i class="bi bi-journal-text me-2"></i>감사 로그</a>
            </div>
            <div sec:authorize="hasRole('USER')">
                <div class="nav-section">평가</div>
                <a class="nav-link" href="/user/dashboard"><i class="bi bi-house me-2"></i>홈</a>
                <a class="nav-link" href="/user/evaluations"><i class="bi bi-pencil-square me-2"></i>나의 평가</a>
            </div>
        </nav>

        <main class="col-md-10 main-content">
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${uploadResult}" class="alert alert-dismissible fade show"
                 th:classappend="${uploadResult.status == 'SUCCESS'} ? ' alert-success' : (${uploadResult.status == 'PARTIAL'} ? ' alert-warning' : ' alert-danger')">
                <strong>업로드 결과:</strong>
                전체 <span th:text="${uploadResult.totalRows}">0</span>행 /
                성공 <span th:text="${uploadResult.successRows}">0</span>행 /
                실패 <span th:text="${uploadResult.failRows}">0</span>행
                <div th:if="${uploadResult.hasErrors()}" class="mt-2">
                    <table class="table table-sm table-bordered mb-0 bg-white">
                        <thead class="table-light"><tr><th>행</th><th>컬럼</th><th>오류 내용</th></tr></thead>
                        <tbody>
                        <tr th:each="err : ${uploadResult.errors}">
                            <td th:text="${err.rowNumber}"></td>
                            <td th:text="${err.column}"></td>
                            <td th:text="${err.message}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <th:block th:replace="${content}"></th:block>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<th:block th:replace="${scripts}"></th:block>
</body>
</html>
