<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::scripts}, ~{::headExtra})}">
<head>
    <title>간편 관계 설정</title>
</head>
<th:block th:fragment="headExtra"></th:block>
<th:block th:fragment="content">

    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/admin/evaluation/sessions/{id}(id=${evalSession.id})}"
           class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h4 class="mb-0 fw-bold" th:text="${evalSession.name + ' — 간편 관계 설정'}">간편 관계 설정</h4>
            <small class="text-muted">직위 기반으로 평가 관계를 빠르게 설정합니다. 확정 후 세션 시작 시 자동으로 배정됩니다.</small>
        </div>
    </div>

    <!-- 알림 영역 -->
    <div id="alertBox" class="d-none mb-3"></div>

    <div class="row g-4">
        <!-- 좌: 설정 패널 -->
        <div class="col-lg-5">

            <!-- 상향 평가 -->
            <div class="card mb-3">
                <div class="card-header d-flex align-items-center gap-2">
                    <input class="form-check-input mt-0" type="checkbox" id="upwardEnabled">
                    <label class="form-check-label fw-semibold mb-0" for="upwardEnabled">
                        상향 평가 <span class="badge bg-primary ms-1">UPWARD</span>
                    </label>
                    <small class="text-muted ms-2">하위 직위 → 상위 직위 평가</small>
                </div>
                <div class="card-body" id="upwardBody" style="display:none;">
                    <div class="mb-3">
                        <label class="form-label fw-semibold small">평가자 직위 (하위)</label>
                        <div id="upwardEvaluatorPositions" class="position-check-group border rounded p-2" style="max-height:180px;overflow-y:auto;">
                            <div th:each="pos : ${availablePositions}" class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       th:id="'upEval_' + ${pos}" th:value="${pos}"
                                       name="upwardEvaluatorPositions">
                                <label class="form-check-label small" th:for="'upEval_' + ${pos}" th:text="${pos}"></label>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="form-label fw-semibold small">피평가자 직위 (상위)</label>
                        <div id="upwardEvaluateePositions" class="position-check-group border rounded p-2" style="max-height:180px;overflow-y:auto;">
                            <div th:each="pos : ${availablePositions}" class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       th:id="'upEvatee_' + ${pos}" th:value="${pos}"
                                       name="upwardEvaluateePositions">
                                <label class="form-check-label small" th:for="'upEvatee_' + ${pos}" th:text="${pos}"></label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 동료 평가 -->
            <div class="card mb-3">
                <div class="card-header d-flex align-items-center gap-2">
                    <input class="form-check-input mt-0" type="checkbox" id="peerEnabled">
                    <label class="form-check-label fw-semibold mb-0" for="peerEnabled">
                        동료 평가 <span class="badge bg-info ms-1">PEER</span>
                    </label>
                    <small class="text-muted ms-2">같은 직위 내 상호 평가</small>
                </div>
                <div class="card-body" id="peerBody" style="display:none;">
                    <label class="form-label fw-semibold small">대상 직위</label>
                    <div id="peerPositions" class="position-check-group border rounded p-2" style="max-height:180px;overflow-y:auto;">
                        <div th:each="pos : ${availablePositions}" class="form-check">
                            <input class="form-check-input" type="checkbox"
                                   th:id="'peer_' + ${pos}" th:value="${pos}"
                                   name="peerPositions">
                            <label class="form-check-label small" th:for="'peer_' + ${pos}" th:text="${pos}"></label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 하향 평가 -->
            <div class="card mb-3">
                <div class="card-header d-flex align-items-center gap-2">
                    <input class="form-check-input mt-0" type="checkbox" id="downwardEnabled">
                    <label class="form-check-label fw-semibold mb-0" for="downwardEnabled">
                        하향 평가 <span class="badge bg-warning text-dark ms-1">DOWNWARD</span>
                    </label>
                    <small class="text-muted ms-2">상위 직위 → 하위 직위 평가</small>
                </div>
                <div class="card-body" id="downwardBody" style="display:none;">
                    <div class="mb-3">
                        <label class="form-label fw-semibold small">평가자 직위 (상위)</label>
                        <div id="downwardEvaluatorPositions" class="position-check-group border rounded p-2" style="max-height:180px;overflow-y:auto;">
                            <div th:each="pos : ${availablePositions}" class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       th:id="'downEval_' + ${pos}" th:value="${pos}"
                                       name="downwardEvaluatorPositions">
                                <label class="form-check-label small" th:for="'downEval_' + ${pos}" th:text="${pos}"></label>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="form-label fw-semibold small">피평가자 직위 (하위)</label>
                        <div id="downwardEvaluateePositions" class="position-check-group border rounded p-2" style="max-height:180px;overflow-y:auto;">
                            <div th:each="pos : ${availablePositions}" class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       th:id="'downEvatee_' + ${pos}" th:value="${pos}"
                                       name="downwardEvaluateePositions">
                                <label class="form-check-label small" th:for="'downEvatee_' + ${pos}" th:text="${pos}"></label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="button" class="btn btn-outline-primary" onclick="doPreview()">
                    <i class="bi bi-eye me-1"></i>미리보기
                </button>
                <button type="button" class="btn btn-success" id="applyBtn" onclick="doApply()" disabled>
                    <i class="bi bi-check-circle me-1"></i>관계 설정 확정
                </button>
            </div>
        </div>

        <!-- 우: 미리보기 패널 -->
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header d-flex align-items-center justify-content-between">
                    <span class="fw-semibold">미리보기 결과</span>
                    <span id="previewCount" class="text-muted small"></span>
                </div>
                <div class="card-body p-0">
                    <div id="previewEmpty" class="text-center text-muted py-4 small">
                        직위를 선택하고 [미리보기]를 눌러주세요.
                    </div>
                    <div class="table-responsive" id="previewTableWrap" style="display:none;">
                        <table class="table table-sm table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-3">유형</th>
                                    <th>평가자</th>
                                    <th>직위</th>
                                    <th>피평가자</th>
                                    <th>직위</th>
                                </tr>
                            </thead>
                            <tbody id="previewTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</th:block>
<th:block th:fragment="scripts">
<script th:inline="javascript">
    const SESSION_ID = /*[[${evalSession.id}]]*/ 0;

    const TYPE_LABEL = { UPWARD: '상향', PEER: '동료', DOWNWARD: '하향' };
    const TYPE_BADGE = {
        UPWARD:   'bg-primary',
        PEER:     'bg-info',
        DOWNWARD: 'bg-warning text-dark'
    };

    // 체크박스 토글로 섹션 show/hide
    ['upward', 'peer', 'downward'].forEach(type => {
        document.getElementById(type + 'Enabled').addEventListener('change', function () {
            document.getElementById(type + 'Body').style.display = this.checked ? '' : 'none';
        });
    });

    function buildRequest() {
        return {
            upwardEnabled: document.getElementById('upwardEnabled').checked,
            upwardEvaluatorPositions: getChecked('upwardEvaluatorPositions'),
            upwardEvaluateePositions: getChecked('upwardEvaluateePositions'),
            peerEnabled: document.getElementById('peerEnabled').checked,
            peerPositions: getChecked('peerPositions'),
            downwardEnabled: document.getElementById('downwardEnabled').checked,
            downwardEvaluatorPositions: getChecked('downwardEvaluatorPositions'),
            downwardEvaluateePositions: getChecked('downwardEvaluateePositions')
        };
    }

    function getChecked(containerId) {
        return Array.from(
            document.getElementById(containerId)?.querySelectorAll('input[type=checkbox]:checked') || []
        ).map(cb => cb.value);
    }

    function getCsrfToken() {
        return document.cookie.split(';')
            .find(c => c.trim().startsWith('XSRF-TOKEN='))
            ?.split('=')[1] || '';
    }

    function doPreview() {
        const req = buildRequest();
        fetch(`/admin/evaluation/sessions/${SESSION_ID}/relationships/simple/preview`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': getCsrfToken() },
            body: JSON.stringify(req)
        })
        .then(r => r.json())
        .then(data => renderPreview(data))
        .catch(() => showAlert('danger', '미리보기 요청 중 오류가 발생했습니다.'));
    }

    function renderPreview(data) {
        const items = data.items || [];
        const total = data.totalCount || 0;
        const countEl = document.getElementById('previewCount');
        const empty = document.getElementById('previewEmpty');
        const wrap = document.getElementById('previewTableWrap');
        const tbody = document.getElementById('previewTableBody');
        const applyBtn = document.getElementById('applyBtn');

        if (items.length === 0) {
            countEl.textContent = '0건';
            empty.style.display = '';
            wrap.style.display = 'none';
            applyBtn.disabled = true;
            return;
        }

        countEl.textContent = total > items.length
            ? `총 ${total}건 (상위 ${items.length}건 표시)`
            : `총 ${total}건`;

        tbody.innerHTML = items.map(item => `
            <tr>
                <td class="ps-3">
                    <span class="badge ${TYPE_BADGE[item.relationType] || 'bg-secondary'}">
                        ${TYPE_LABEL[item.relationType] || item.relationType}
                    </span>
                </td>
                <td>${escHtml(item.evaluatorName)}<br><span class="text-muted small">${escHtml(item.evaluatorDept || '-')}</span></td>
                <td class="small text-muted">${escHtml(item.evaluatorPosition || '-')}</td>
                <td>${escHtml(item.evaluateeName)}<br><span class="text-muted small">${escHtml(item.evaluateeDept || '-')}</span></td>
                <td class="small text-muted">${escHtml(item.evaluateePosition || '-')}</td>
            </tr>
        `).join('');

        empty.style.display = 'none';
        wrap.style.display = '';
        applyBtn.disabled = false;
    }

    function doApply() {
        if (!confirm('선택한 설정으로 관계를 확정하시겠습니까?\n이전 간편 설정이 있다면 덮어씁니다.')) return;
        const req = buildRequest();
        fetch(`/admin/evaluation/sessions/${SESSION_ID}/relationships/simple/apply`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': getCsrfToken() },
            body: JSON.stringify(req)
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                showAlert('success', data.message + ' 세션 상세 페이지로 이동합니다.');
                setTimeout(() => { location.href = `/admin/evaluation/sessions/${SESSION_ID}`; }, 1500);
            } else {
                showAlert('danger', data.message || '오류가 발생했습니다.');
            }
        })
        .catch(() => showAlert('danger', '적용 요청 중 오류가 발생했습니다.'));
    }

    function showAlert(type, message) {
        const box = document.getElementById('alertBox');
        box.className = `alert alert-${type} alert-dismissible fade show`;
        box.innerHTML = `${escHtml(message)}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
    }

    function escHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</th:block>
</html>
