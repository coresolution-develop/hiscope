<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::scripts}, ~{::headExtra})}">
<head>
    <title>간편 관계 설정</title>
</head>
<th:block th:fragment="headExtra"></th:block>
<th:block th:fragment="content">

    <div class="d-flex align-items-center gap-2 mb-4">
        <a th:href="@{/admin/evaluation/sessions/{id}(id=${evalSession.id})}"
           class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i>
        </a>
        <div>
            <h4 class="mb-0 fw-bold" th:text="${evalSession.name + ' — 간편 관계 설정'}">간편 관계 설정</h4>
            <small class="text-muted">부서 기반으로 평가 관계를 빠르게 설정합니다. 확정 후 세션 시작 시 자동으로 배정됩니다.</small>
        </div>
    </div>

    <div class="row g-4">
        <!-- 좌: 설정 패널 -->
        <div class="col-lg-5">
            <form id="previewForm"
                  th:action="@{/admin/evaluation/sessions/{id}/relationships/simple/preview(id=${evalSession.id})}"
                  method="post">

                <!-- 상향 평가 -->
                <div class="card mb-3">
                    <div class="card-header d-flex align-items-center gap-2">
                        <input class="form-check-input mt-0" type="checkbox" id="upwardEnabled"
                               name="upwardEnabled" value="true"
                               th:checked="${wizardRequest != null and wizardRequest.upwardEnabled}"
                               onchange="toggleSection('upward', this.checked)">
                        <label class="form-check-label fw-semibold mb-0" for="upwardEnabled">
                            상향 평가 <span class="badge bg-primary ms-1">UPWARD</span>
                        </label>
                        <small class="text-muted ms-2">부서원 → 부서장</small>
                    </div>
                    <div class="card-body" id="upwardSection"
                         th:style="${wizardRequest != null and wizardRequest.upwardEnabled} ? '' : 'display:none'">
                        <div class="d-flex gap-2 mb-2">
                            <button type="button" class="btn btn-outline-secondary btn-sm"
                                    onclick="selectAll('upwardDeptIds')">전체 선택</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm"
                                    onclick="clearAll('upwardDeptIds')">전체 해제</button>
                        </div>
                        <div class="border rounded p-2" style="max-height:200px;overflow-y:auto;">
                            <div th:each="dept : ${departments}" class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       name="upwardDeptIds" th:value="${dept.id}"
                                       th:id="${'upward_' + dept.id}"
                                       th:checked="${wizardRequest != null and wizardRequest.upwardDeptIds != null and wizardRequest.upwardDeptIds.contains(dept.id)}">
                                <label class="form-check-label small" th:for="${'upward_' + dept.id}">
                                    <span th:text="${dept.name}">부서명</span>
                                    <span class="text-muted" th:text="${'(' + dept.totalEmployees + '명)'}"></span>
                                    <span class="badge bg-danger ms-1" th:if="${dept.leaderCount == 0}">부서장 없음</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 동료 평가 -->
                <div class="card mb-3">
                    <div class="card-header d-flex align-items-center gap-2">
                        <input class="form-check-input mt-0" type="checkbox" id="peerEnabled"
                               name="peerEnabled" value="true"
                               th:checked="${wizardRequest != null and wizardRequest.peerEnabled}"
                               onchange="toggleSection('peer', this.checked)">
                        <label class="form-check-label fw-semibold mb-0" for="peerEnabled">
                            동료 평가 <span class="badge bg-info ms-1">PEER</span>
                        </label>
                        <small class="text-muted ms-2">부서원끼리 상호 평가</small>
                    </div>
                    <div class="card-body" id="peerSection"
                         th:style="${wizardRequest != null and wizardRequest.peerEnabled} ? '' : 'display:none'">
                        <div class="d-flex gap-2 mb-2">
                            <button type="button" class="btn btn-outline-secondary btn-sm"
                                    onclick="selectAll('peerDeptIds')">전체 선택</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm"
                                    onclick="clearAll('peerDeptIds')">전체 해제</button>
                        </div>
                        <div class="border rounded p-2" style="max-height:200px;overflow-y:auto;">
                            <div th:each="dept : ${departments}" class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       name="peerDeptIds" th:value="${dept.id}"
                                       th:id="${'peer_' + dept.id}"
                                       th:checked="${wizardRequest != null and wizardRequest.peerDeptIds != null and wizardRequest.peerDeptIds.contains(dept.id)}">
                                <label class="form-check-label small" th:for="${'peer_' + dept.id}">
                                    <span th:text="${dept.name}">부서명</span>
                                    <span class="text-muted" th:text="${'(' + dept.totalEmployees + '명)'}"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 하향 평가 -->
                <div class="card mb-3">
                    <div class="card-header d-flex align-items-center gap-2">
                        <input class="form-check-input mt-0" type="checkbox" id="downwardEnabled"
                               name="downwardEnabled" value="true"
                               th:checked="${wizardRequest != null and wizardRequest.downwardEnabled}"
                               onchange="toggleSection('downward', this.checked)">
                        <label class="form-check-label fw-semibold mb-0" for="downwardEnabled">
                            하향 평가 <span class="badge bg-warning text-dark ms-1">DOWNWARD</span>
                        </label>
                        <small class="text-muted ms-2">부서장 → 부서원</small>
                    </div>
                    <div class="card-body" id="downwardSection"
                         th:style="${wizardRequest != null and wizardRequest.downwardEnabled} ? '' : 'display:none'">
                        <div class="d-flex gap-2 mb-2">
                            <button type="button" class="btn btn-outline-secondary btn-sm"
                                    onclick="selectAll('downwardDeptIds')">전체 선택</button>
                            <button type="button" class="btn btn-outline-secondary btn-sm"
                                    onclick="clearAll('downwardDeptIds')">전체 해제</button>
                        </div>
                        <div class="border rounded p-2" style="max-height:200px;overflow-y:auto;">
                            <div th:each="dept : ${departments}" class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       name="downwardDeptIds" th:value="${dept.id}"
                                       th:id="${'downward_' + dept.id}"
                                       th:checked="${wizardRequest != null and wizardRequest.downwardDeptIds != null and wizardRequest.downwardDeptIds.contains(dept.id)}">
                                <label class="form-check-label small" th:for="${'downward_' + dept.id}">
                                    <span th:text="${dept.name}">부서명</span>
                                    <span class="text-muted" th:text="${'(' + dept.totalEmployees + '명)'}"></span>
                                    <span class="badge bg-danger ms-1" th:if="${dept.leaderCount == 0}">부서장 없음</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-outline-primary">
                    <i class="bi bi-eye me-1"></i>미리보기
                </button>
            </form>
        </div>

        <!-- 우: 미리보기 결과 -->
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header d-flex align-items-center justify-content-between">
                    <span class="fw-semibold">미리보기 결과</span>
                    <span class="text-muted small" th:if="${previewResult != null}"
                          th:text="${previewResult.truncated} ? '총 ' + ${previewResult.totalCount} + '건 (300건만 표시)' : '총 ' + ${previewResult.totalCount} + '건'"></span>
                </div>

                <!-- 결과 없을 때 -->
                <div th:if="${previewResult == null}" class="card-body">
                    <div class="text-center text-muted py-3 small">부서를 선택하고 [미리보기]를 눌러주세요.</div>
                </div>

                <!-- 결과 있을 때 -->
                <div th:if="${previewResult != null}">

                    <!-- 경고 메시지 -->
                    <div class="px-3 pt-3" th:if="${not #lists.isEmpty(previewResult.warnings)}">
                        <div class="alert alert-warning py-2 small mb-2"
                             th:each="w : ${previewResult.warnings}">
                            <i class="bi bi-exclamation-triangle me-1"></i>
                            <span th:text="${w}"></span>
                        </div>
                    </div>

                    <!-- 관계 없음 -->
                    <div th:if="${#lists.isEmpty(previewResult.items)}" class="card-body">
                        <div class="text-center text-muted py-3 small">생성되는 평가 관계가 없습니다.</div>
                    </div>

                    <!-- 결과 테이블 -->
                    <div class="table-responsive" th:if="${not #lists.isEmpty(previewResult.items)}">
                        <table class="table table-sm table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-3">유형</th>
                                    <th>평가자</th>
                                    <th>직책</th>
                                    <th>피평가자</th>
                                    <th>직책</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${previewResult.items}">
                                    <td class="ps-3">
                                        <span class="badge bg-primary" th:if="${item.relationType == 'UPWARD'}">상향</span>
                                        <span class="badge bg-info" th:if="${item.relationType == 'PEER'}">동료</span>
                                        <span class="badge bg-warning text-dark" th:if="${item.relationType == 'DOWNWARD'}">하향</span>
                                    </td>
                                    <td>
                                        <span th:text="${item.evaluatorName}"></span>
                                        <br><span class="text-muted small" th:text="${item.evaluatorDept}"></span>
                                    </td>
                                    <td class="small text-muted" th:text="${item.evaluatorJobTitle != null ? item.evaluatorJobTitle : '-'}"></td>
                                    <td>
                                        <span th:text="${item.evaluateeName}"></span>
                                        <br><span class="text-muted small" th:text="${item.evaluateeDept}"></span>
                                    </td>
                                    <td class="small text-muted" th:text="${item.evaluateeJobTitle != null ? item.evaluateeJobTitle : '-'}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 확정 폼 -->
                    <div class="p-3 border-top" th:if="${not #lists.isEmpty(previewResult.items)}">
                        <form th:action="@{/admin/evaluation/sessions/{id}/relationships/simple/apply(id=${evalSession.id})}"
                              method="post">
                            <!-- 선택값 유지: hidden inputs -->
                            <input th:if="${wizardRequest.upwardEnabled}" type="hidden" name="upwardEnabled" value="true">
                            <th:block th:if="${wizardRequest.upwardDeptIds != null}">
                                <input th:each="deptId : ${wizardRequest.upwardDeptIds}"
                                       type="hidden" name="upwardDeptIds" th:value="${deptId}">
                            </th:block>
                            <input th:if="${wizardRequest.peerEnabled}" type="hidden" name="peerEnabled" value="true">
                            <th:block th:if="${wizardRequest.peerDeptIds != null}">
                                <input th:each="deptId : ${wizardRequest.peerDeptIds}"
                                       type="hidden" name="peerDeptIds" th:value="${deptId}">
                            </th:block>
                            <input th:if="${wizardRequest.downwardEnabled}" type="hidden" name="downwardEnabled" value="true">
                            <th:block th:if="${wizardRequest.downwardDeptIds != null}">
                                <input th:each="deptId : ${wizardRequest.downwardDeptIds}"
                                       type="hidden" name="downwardDeptIds" th:value="${deptId}">
                            </th:block>

                            <button type="submit" class="btn btn-success"
                                    onclick="return confirm('이 관계 설정을 확정하시겠습니까?\n이전 간편 설정이 있다면 덮어씁니다.')">
                                <i class="bi bi-check-circle me-1"></i>관계 설정 확정
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</th:block>
<th:block th:fragment="scripts">
<script>
    function toggleSection(name, enabled) {
        const section = document.getElementById(name + 'Section');
        if (section) section.style.display = enabled ? '' : 'none';
    }

    function selectAll(name) {
        document.querySelectorAll('input[name="' + name + '"]')
            .forEach(cb => cb.checked = true);
    }

    function clearAll(name) {
        document.querySelectorAll('input[name="' + name + '"]')
            .forEach(cb => cb.checked = false);
    }
</script>
</th:block>
</html>
