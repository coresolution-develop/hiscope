<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::scripts}, ~{::headExtra})}">
<head><title>평가 결과 조회</title></head>
<th:block th:fragment="headExtra"></th:block>
<th:block th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold"><i class="bi bi-clipboard-data me-2 text-primary"></i>평가 결과 조회</h4>
    <div class="d-flex gap-2" th:if="${selectedSessionId != null}">
        <a class="btn btn-outline-success btn-sm"
           th:href="@{/admin/evaluation/results/evaluatees.csv(sessionId=${selectedSessionId},keyword=${keyword},departmentId=${departmentId},sortBy=${sortBy},sortDir=${sortDir})}">
            대상자별 CSV
        </a>
        <a class="btn btn-outline-success btn-sm"
           th:href="@{/admin/evaluation/results/departments.csv(sessionId=${selectedSessionId},keyword=${keyword},departmentId=${departmentId},sortBy=${sortBy},sortDir=${sortDir})}">
            부서별 CSV
        </a>
        <a class="btn btn-outline-success btn-sm"
           th:href="@{/admin/evaluation/results/assignments.csv(sessionId=${selectedSessionId},keyword=${keyword},departmentId=${departmentId},assignmentSortBy='submittedAt',assignmentSortDir='desc')}">
            배정별 CSV
        </a>
    </div>
</div>

<div class="card mb-3">
    <div class="card-body">
        <form method="get" th:action="@{/admin/evaluation/results}" class="row g-2 align-items-end">
            <div class="col-md-3">
                <label class="form-label small text-muted mb-1">세션</label>
                <select name="sessionId" class="form-select form-select-sm">
                    <option th:if="${#lists.isEmpty(sessions)}" value="">세션 없음</option>
                    <option th:each="s : ${sessions}" th:value="${s.id}" th:text="${s.name}" th:selected="${selectedSessionId == s.id}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-1">부서</label>
                <select name="departmentId" class="form-select form-select-sm">
                    <option value="">전체</option>
                    <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}" th:selected="${departmentId == d.id}"></option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-1">검색</label>
                <input type="text" name="keyword" class="form-control form-control-sm" placeholder="이름/사번" th:value="${keyword}">
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-1">정렬 기준</label>
                <select name="sortBy" class="form-select form-select-sm">
                    <option value="evaluateeName" th:selected="${sortBy == 'evaluateeName'}">이름</option>
                    <option value="averageScore" th:selected="${sortBy == 'averageScore'}">평균 점수</option>
                    <option value="submittedEvaluatorCount" th:selected="${sortBy == 'submittedEvaluatorCount'}">제출 수</option>
                    <option value="submissionRate" th:selected="${sortBy == 'submissionRate'}">제출률</option>
                </select>
            </div>
            <div class="col-md-1">
                <label class="form-label small text-muted mb-1">방향</label>
                <select name="sortDir" class="form-select form-select-sm">
                    <option value="asc" th:selected="${sortDir == 'asc'}">오름</option>
                    <option value="desc" th:selected="${sortDir == 'desc'}">내림</option>
                </select>
            </div>
            <div class="col-md-2 text-end">
                <input type="hidden" name="size" th:value="${size != null ? size : 20}">
                <input type="hidden" name="pendingSortBy" th:value="${pendingSortBy}">
                <input type="hidden" name="pendingSortDir" th:value="${pendingSortDir}">
                <button type="submit" class="btn btn-primary btn-sm">조회</button>
                <a class="btn btn-outline-secondary btn-sm" href="/admin/evaluation/results">초기화</a>
            </div>
        </form>
    </div>
</div>

<div class="row g-3 mb-3" th:if="${summary != null}">
    <div class="col-md-3">
        <div class="card h-100">
            <div class="card-body py-3">
                <div class="small text-muted">대상자 수</div>
                <div class="h4 mb-0" th:text="${summary.evaluateeCount}">0</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card h-100">
            <div class="card-body py-3">
                <div class="small text-muted">총 배정</div>
                <div class="h4 mb-0" th:text="${summary.totalAssignments}">0</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card h-100">
            <div class="card-body py-3">
                <div class="small text-muted">제출 완료</div>
                <div class="h4 mb-0 text-success" th:text="${summary.submittedAssignments}">0</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card h-100">
            <div class="card-body py-3">
                <div class="small text-muted">전체 제출률</div>
                <div class="h4 mb-0" th:text="${summary.submissionRate + '%'}">0%</div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card h-100">
            <div class="card-body py-3">
                <div class="small text-muted">미제출 배정</div>
                <div class="h4 mb-0 text-danger" th:text="${summary.pendingAssignments}">0</div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead><tr><th>대상자</th><th>사번</th><th>부서</th><th>제출 수</th><th>제출률</th><th>평균 점수</th></tr></thead>
            <tbody>
            <tr th:each="row : ${rows}">
                <td th:text="${row.evaluateeName}"></td>
                <td th:text="${row.employeeNumber != null ? row.employeeNumber : '-'}"></td>
                <td th:text="${row.departmentName != null ? row.departmentName : '-'}"></td>
                <td><span th:text="${row.submittedEvaluatorCount + ' / ' + row.totalEvaluatorCount}"></span></td>
                <td th:text="${row.submissionRate + '%'}"></td>
                <td th:text="${row.averageScore != null ? row.averageScore : '-'}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(rows)}">
                <td colspan="6" class="text-center text-muted py-4">조회 결과가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="card mt-3" th:if="${summary != null}">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span class="fw-semibold">미제출자 목록</span>
        <div class="d-flex align-items-center gap-2">
            <form method="get" th:action="@{/admin/evaluation/results}" class="d-flex align-items-center gap-2">
                <input type="hidden" name="sessionId" th:value="${selectedSessionId}">
                <input type="hidden" name="keyword" th:value="${keyword}">
                <input type="hidden" name="departmentId" th:value="${departmentId}">
                <input type="hidden" name="sortBy" th:value="${sortBy}">
                <input type="hidden" name="sortDir" th:value="${sortDir}">
                <input type="hidden" name="size" th:value="${size}">
                <select name="pendingSortBy" class="form-select form-select-sm">
                    <option value="assignedAt" th:selected="${pendingSortBy == 'assignedAt'}">배정일시</option>
                    <option value="evaluatorName" th:selected="${pendingSortBy == 'evaluatorName'}">평가자</option>
                    <option value="evaluateeName" th:selected="${pendingSortBy == 'evaluateeName'}">피평가자</option>
                </select>
                <select name="pendingSortDir" class="form-select form-select-sm">
                    <option value="desc" th:selected="${pendingSortDir == 'desc'}">내림</option>
                    <option value="asc" th:selected="${pendingSortDir == 'asc'}">오름</option>
                </select>
                <button type="submit" class="btn btn-outline-secondary btn-sm">정렬</button>
            </form>
            <a class="btn btn-outline-danger btn-sm"
               th:if="${selectedSessionId != null}"
               th:href="@{/admin/evaluation/results/pending.csv(sessionId=${selectedSessionId},keyword=${keyword},departmentId=${departmentId},pendingSortBy=${pendingSortBy},pendingSortDir=${pendingSortDir})}">
                미제출자 CSV 다운로드
            </a>
        </div>
    </div>
    <div class="card-body p-0">
        <table class="table table-sm table-hover mb-0">
            <thead><tr><th>평가자</th><th>사번</th><th>부서</th><th>피평가자</th><th>사번</th><th>배정일시</th></tr></thead>
            <tbody>
            <tr th:each="p : ${pendingRows}">
                <td th:text="${p.evaluatorName}"></td>
                <td th:text="${p.evaluatorEmployeeNumber != null ? p.evaluatorEmployeeNumber : '-'}"></td>
                <td th:text="${p.evaluatorDepartmentName != null ? p.evaluatorDepartmentName : '-'}"></td>
                <td th:text="${p.evaluateeName}"></td>
                <td th:text="${p.evaluateeEmployeeNumber != null ? p.evaluateeEmployeeNumber : '-'}"></td>
                <td th:text="${p.assignedAt != null ? #temporals.format(p.assignedAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(pendingRows)}">
                <td colspan="6" class="text-center text-muted py-3">현재 조건에서 미제출자가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="d-flex justify-content-between align-items-center mt-3" th:if="${resultPage != null}">
    <div class="small text-muted">
        총 <span th:text="${resultPage.totalElements}">0</span>건 /
        <span th:text="${resultPage.number + 1}">1</span> / <span th:text="${resultPage.totalPages}">1</span> 페이지
    </div>
    <nav th:if="${resultPage.totalPages > 1}">
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${resultPage.first} ? ' disabled'">
                <a class="page-link"
                   th:href="@{/admin/evaluation/results(page=${resultPage.number - 1},size=${size},sessionId=${selectedSessionId},keyword=${keyword},departmentId=${departmentId},sortBy=${sortBy},sortDir=${sortDir},pendingSortBy=${pendingSortBy},pendingSortDir=${pendingSortDir})}">이전</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="|${resultPage.number + 1} / ${resultPage.totalPages}|">1 / 1</span>
            </li>
            <li class="page-item" th:classappend="${resultPage.last} ? ' disabled'">
                <a class="page-link"
                   th:href="@{/admin/evaluation/results(page=${resultPage.number + 1},size=${size},sessionId=${selectedSessionId},keyword=${keyword},departmentId=${departmentId},sortBy=${sortBy},sortDir=${sortDir},pendingSortBy=${pendingSortBy},pendingSortDir=${pendingSortDir})}">다음</a>
            </li>
        </ul>
    </nav>
</div>
</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
