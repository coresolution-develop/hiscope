<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::scripts}, ~{::headExtra})}">
<head><title>감사 로그</title></head>
<th:block th:fragment="headExtra"></th:block>
<th:block th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold"><i class="bi bi-journal-text me-2 text-primary"></i>감사 로그</h4>
</div>

<div class="card mb-3">
    <div class="card-body py-3">
        <form method="get" th:action="${superAdminView} ? @{/super-admin/audit} : @{/admin/audit}">
            <div class="row g-2 align-items-end">
                <div class="col-md-2" th:if="${superAdminView}">
                    <label class="form-label small text-muted mb-1">기관 ID</label>
                    <input type="number" name="organizationId" class="form-control form-control-sm" th:value="${organizationId}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-1">액션</label>
                    <select name="action" class="form-select form-select-sm">
                        <option value="">전체</option>
                        <option th:each="a : ${actionOptions}" th:value="${a}" th:text="${a}" th:selected="${a == action}"></option>
                    </select>
                </div>
                <div class="col-md-1">
                    <label class="form-label small text-muted mb-1">결과</label>
                    <select name="outcome" class="form-select form-select-sm">
                        <option value="">전체</option>
                        <option value="SUCCESS" th:selected="${outcome == 'SUCCESS'}">SUCCESS</option>
                        <option value="FAIL" th:selected="${outcome == 'FAIL'}">FAIL</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-1">사용자</label>
                    <input name="actorLoginId" class="form-control form-control-sm" th:value="${actorLoginId}" placeholder="loginId">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-1">요청 ID</label>
                    <input name="requestId" class="form-control form-control-sm" th:value="${requestId}" placeholder="X-Request-Id">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-1">시작일</label>
                    <input type="date" name="fromDate" class="form-control form-control-sm" th:value="${fromDate}">
                </div>
                <div class="col-md-2">
                    <label class="form-label small text-muted mb-1">종료일</label>
                    <input type="date" name="toDate" class="form-control form-control-sm" th:value="${toDate}">
                </div>
                <div class="col-md-1">
                    <label class="form-label small text-muted mb-1">건수</label>
                    <select name="size" class="form-select form-select-sm">
                        <option value="50" th:selected="${size == 50}">50</option>
                        <option value="100" th:selected="${size == 100}">100</option>
                        <option value="200" th:selected="${size == 200}">200</option>
                    </select>
                </div>
                <div class="col-md-1">
                    <button type="submit" class="btn btn-primary btn-sm w-100">조회</button>
                </div>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-sm table-hover mb-0">
            <thead>
            <tr>
                <th>시각</th>
                <th>결과</th>
                <th>액션</th>
                <th>사용자</th>
                <th>기관</th>
                <th>대상</th>
                <th>요청 ID</th>
                <th>상세</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="log : ${auditLogs}">
                <td class="small" th:text="${#temporals.format(log.occurredAt, 'yyyy-MM-dd HH:mm:ss')}">-</td>
                <td>
                    <span class="badge bg-success" th:if="${log.outcome == 'SUCCESS'}">SUCCESS</span>
                    <span class="badge bg-danger" th:if="${log.outcome == 'FAIL'}">FAIL</span>
                </td>
                <td><code th:text="${log.action}">-</code></td>
                <td>
                    <div th:text="${log.actorLoginId ?: '-'}"></div>
                    <div class="small text-muted" th:text="${log.actorRole ?: '-'}"></div>
                </td>
                <td th:text="${log.organizationId ?: '-'}">-</td>
                <td>
                    <div th:text="${log.targetType ?: '-'}"></div>
                    <div class="small text-muted" th:text="${log.targetId ?: '-'}"></div>
                </td>
                <td><code th:text="${log.requestId ?: '-'}"></code></td>
                <td class="small text-muted" th:text="${log.detail ?: '-'}">-</td>
            </tr>
            <tr th:if="${#lists.isEmpty(auditLogs)}">
                <td colspan="8" class="text-center text-muted py-4">조회 결과가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="d-flex justify-content-between align-items-center mt-3" th:if="${auditPage != null}">
    <div class="small text-muted">
        총 <span th:text="${auditPage.totalElements}">0</span>건 /
        <span th:text="${auditPage.number + 1}">1</span> / <span th:text="${auditPage.totalPages}">1</span> 페이지
    </div>
    <nav th:if="${auditPage.totalPages > 1}">
        <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${auditPage.first} ? ' disabled'">
                <a class="page-link"
                   th:href="${superAdminView}
                     ? @{/super-admin/audit(page=${auditPage.number - 1},size=${size},organizationId=${organizationId},action=${action},outcome=${outcome},actorLoginId=${actorLoginId},requestId=${requestId},fromDate=${fromDate},toDate=${toDate})}
                     : @{/admin/audit(page=${auditPage.number - 1},size=${size},action=${action},outcome=${outcome},actorLoginId=${actorLoginId},requestId=${requestId},fromDate=${fromDate},toDate=${toDate})}">이전</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="|${auditPage.number + 1} / ${auditPage.totalPages}|">1 / 1</span>
            </li>
            <li class="page-item" th:classappend="${auditPage.last} ? ' disabled'">
                <a class="page-link"
                   th:href="${superAdminView}
                     ? @{/super-admin/audit(page=${auditPage.number + 1},size=${size},organizationId=${organizationId},action=${action},outcome=${outcome},actorLoginId=${actorLoginId},requestId=${requestId},fromDate=${fromDate},toDate=${toDate})}
                     : @{/admin/audit(page=${auditPage.number + 1},size=${size},action=${action},outcome=${outcome},actorLoginId=${actorLoginId},requestId=${requestId},fromDate=${fromDate},toDate=${toDate})}">다음</a>
            </li>
        </ul>
    </nav>
</div>
</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
