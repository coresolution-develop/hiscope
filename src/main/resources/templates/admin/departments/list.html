<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::title}, ~{::content}, ~{::scripts}, ~{::headExtra})}">
<head><title>부서 관리</title></head>
<th:block th:fragment="headExtra"></th:block>
<th:block th:fragment="content">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0 fw-bold"><i class="bi bi-diagram-3 me-2 text-primary"></i>부서 관리</h4>
    <div class="d-flex gap-2">
        <form th:action="@{/admin/uploads/departments}" method="post" enctype="multipart/form-data" class="d-flex gap-2">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="file" name="file" accept=".xlsx" class="form-control form-control-sm" style="width:220px">
            <button type="submit" class="btn btn-outline-success btn-sm">
                <i class="bi bi-upload me-1"></i>엑셀 업로드
            </button>
        </form>
        <a href="/admin/uploads/template/departments" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-download me-1"></i>템플릿
        </a>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addDeptModal">
            <i class="bi bi-plus-lg me-1"></i>부서 추가
        </button>
    </div>
</div>
<div class="card mb-3">
    <div class="card-body py-3">
        <form method="get" th:action="@{/admin/departments}" class="row g-2 align-items-end">
            <div class="col-md-4">
                <label class="form-label small text-muted mb-1">검색</label>
                <input type="text" name="keyword" class="form-control form-control-sm" placeholder="부서명/코드"
                       th:value="${keyword}">
            </div>
            <div class="col-md-3">
                <label class="form-label small text-muted mb-1">상태</label>
                <select name="active" class="form-select form-select-sm">
                    <option value="">전체</option>
                    <option value="true" th:selected="${active == true}">활성</option>
                    <option value="false" th:selected="${active == false}">비활성</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small text-muted mb-1">정렬</label>
                <select name="sortBy" class="form-select form-select-sm">
                    <option value="name" th:selected="${sortBy == 'name'}">부서명</option>
                    <option value="code" th:selected="${sortBy == 'code'}">코드</option>
                    <option value="active" th:selected="${sortBy == 'active'}">상태</option>
                    <option value="createdAt" th:selected="${sortBy == 'createdAt'}">생성일</option>
                </select>
            </div>
            <div class="col-md-1">
                <label class="form-label small text-muted mb-1">방향</label>
                <select name="sortDir" class="form-select form-select-sm">
                    <option value="asc" th:selected="${sortDir == 'asc'}">오름</option>
                    <option value="desc" th:selected="${sortDir == 'desc'}">내림</option>
                </select>
            </div>
            <div class="col-md-1">
                <label class="form-label small text-muted mb-1">건수</label>
                <select name="size" class="form-select form-select-sm">
                    <option value="20" th:selected="${size == 20}">20</option>
                    <option value="50" th:selected="${size == 50}">50</option>
                    <option value="100" th:selected="${size == 100}">100</option>
                </select>
            </div>
            <div class="col-md-1 d-flex gap-2">
                <button type="submit" class="btn btn-outline-primary btn-sm">적용</button>
                <a href="/admin/departments" class="btn btn-outline-secondary btn-sm">초기화</a>
            </div>
        </form>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <table class="table table-hover mb-0">
            <thead><tr><th>부서명</th><th>코드</th><th>상위 부서</th><th>상태</th><th width="160">관리</th></tr></thead>
            <tbody>
            <tr th:each="dept : ${departments}">
                <td class="fw-semibold" th:text="${dept.name}"></td>
                <td><code th:text="${dept.code}"></code></td>
                <td th:text="${dept.parentName} ?: '-'" class="text-muted small"></td>
                <td><span th:text="${dept.active} ? '활성' : '비활성'"
                          th:class="${dept.active} ? 'badge bg-success' : 'badge bg-secondary'"></span></td>
                <td>
                    <button class="btn btn-outline-secondary btn-sm me-1"
                            th:attr="onclick=|openEditModal(${dept.id}, '${dept.name}', '${dept.code}', ${dept.parentId})|">수정</button>
                    <form th:action="@{/admin/departments/{id}/delete(id=${dept.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-sm"
                                onclick="return confirm('부서를 비활성화하시겠습니까?')">비활성화</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(departments)}">
                <td colspan="5" class="text-center text-muted py-4">등록된 부서가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div class="d-flex justify-content-between align-items-center mt-3" th:if="${deptPage != null}">
    <div class="small text-muted">
        총 <span th:text="${deptPage.totalElements}">0</span>건
    </div>
    <div class="d-flex gap-2" th:if="${deptPage.totalPages > 1}">
        <a class="btn btn-outline-secondary btn-sm"
           th:classappend="${!deptPage.hasPrevious()} ? ' disabled'"
           th:href="@{/admin/departments(page=${deptPage.hasPrevious() ? deptPage.number - 1 : 0},size=${size},keyword=${keyword},active=${active},sortBy=${sortBy},sortDir=${sortDir})}">이전</a>
        <span class="small text-muted align-self-center"
              th:text="${(deptPage.number + 1) + ' / ' + deptPage.totalPages}">1 / 1</span>
        <a class="btn btn-outline-secondary btn-sm"
           th:classappend="${!deptPage.hasNext()} ? ' disabled'"
           th:href="@{/admin/departments(page=${deptPage.hasNext() ? deptPage.number + 1 : deptPage.number},size=${size},keyword=${keyword},active=${active},sortBy=${sortBy},sortDir=${sortDir})}">다음</a>
    </div>
</div>

<!-- 부서 추가 모달 -->
<div class="modal fade" id="addDeptModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">부서 추가</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form th:action="@{/admin/departments}" method="post" th:object="${request}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">부서명 *</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="부서명">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">부서 코드 *</label>
                        <input type="text" th:field="*{code}" class="form-control" placeholder="예: HR (영문 대문자)">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">상위 부서</label>
                        <select th:field="*{parentId}" class="form-select">
                            <option value="">없음 (최상위 부서)</option>
                            <option th:each="dept : ${allDepartments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">추가</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 부서 수정 모달 -->
<div class="modal fade" id="editDeptModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">부서 수정</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <form id="editDeptForm" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">부서명 *</label>
                        <input type="text" id="editName" name="name" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">부서 코드 *</label>
                        <input type="text" id="editCode" name="code" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">상위 부서</label>
                        <select id="editParentId" name="parentId" class="form-select">
                            <option value="">없음</option>
                            <option th:each="dept : ${allDepartments}" th:value="${dept.id}" th:text="${dept.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">취소</button>
                    <button type="submit" class="btn btn-primary">저장</button>
                </div>
            </form>
        </div>
    </div>
</div>
</th:block>
<th:block th:fragment="scripts">
<script>
function openEditModal(id, name, code, parentId) {
    document.getElementById('editDeptForm').action = '/admin/departments/' + id;
    document.getElementById('editName').value = name;
    document.getElementById('editCode').value = code;
    document.getElementById('editParentId').value = parentId || '';
    new bootstrap.Modal(document.getElementById('editDeptModal')).show();
}
</script>
</th:block>
</html>
